<script>
    $(document).ready(function () {
        handlePORowSelection(); // Assuming this is defined elsewhere
        loadPOlist();

        // Re-fetch data on filter change
        $('#id_org, #id_branchs, #id_is_class, #id_is_section, #id_is_shifts, #id_is_groups, #id_is_subjects, #id_exam_type').change(() => {
            loadPOlist();
        });

        function loadPOlist() {
            const orgFilter = $('#id_org').val();
            const branchFilter = $('#id_branchs').val();
            const isClassFilter = $('#id_is_class').val();
            const isSectionFilter = $('#id_is_section').val();
            const isShiftFilter = $('#id_is_shifts').val();
            const isGroupsFilter = $('#id_is_groups').val();
            const issubjectsFilter = $('#id_is_subjects').val();
            const isExamTypeFilter = $('#id_exam_type').val();

            if (!branchFilter) return;

            if (issubjectsFilter) {
                $.ajax({
                    type: 'GET',
                    url: '/get_sms_send_list/',
                    data: {
                        'filter_org': orgFilter,
                        'filter_branch': branchFilter,
                        'filter_class': isClassFilter,
                        'filter_section': isSectionFilter,
                        'filter_shift': isShiftFilter,
                        'filter_groups': isGroupsFilter,
                        'filter_subjects': issubjectsFilter,
                        'filter_examtype': isExamTypeFilter,
                    },
                    success: function (data) {
                        // Update table with new data
                        updatePOTable(data);

                        highlightSelectedRowOnInit(); // Assuming this is defined
                    },
                    error: function (xhr, status, error) {
                        console.error('Ajax Error:', xhr.responseText);
                    }
                });
            }
        }

        function updatePOTable(data) {
            const tableBody = $('#SMSSENDTBODY');
            tableBody.empty();

            if (!data.data || data.data.length === 0) {
                tableBody.append(`<tr><td colspan="11" class="text-center">No data found</td></tr>`);
                return;
            }

            $.each(data.data, function (index, item) {
                const rowHtml = `
                    <tr class="po-row" data-id="${item.res_fin_id}">
                        <td>${index + 1}</td>
                        <td>${item.created_date || ''}</td>
                        <td style="text-align:left; font-weight: bold; color: #78e582;">${item.names_of_exam || ''}</td>
                        <td>${item.exam_date || ''}</td>
                        <td>${item.class_name || ''}</td>
                        <td>${item.section_name || ''}</td>
                        <td>${item.shift_name || ''}</td>
                        <td>${item.group_name || ''}</td>
                        <td>${item.exam_type_name || ''}</td>
                        <td style="text-align:center; font-size: 1rem; font-weight: bold; color: #ffa700;">${item.total_students || 0}</td>
                        <td style="text-align:center; font-size: 1rem; font-weight: bold; color: #00ff00;">${item.sms_success || 0}</td>
                        <td style="text-align:center; font-size: 1rem; font-weight: bold; color: #cd0000;">${item.sms_fail || 0}</td>
                        <td>
                            <button type="button" class="btn btn-info text-white btn-sm results_entry" data-id="${item.res_fin_id}">
                                View
                            </button>
                        </td>
                    </tr>`;
                tableBody.append(rowHtml);
            });
        }
    });

    //
    function handlePORowSelection() {
        // Attach click event listener to all rows
        $(document).on("click", ".po-row", function () {
            var clickedPOId = $(this).data("id");

            // Remove highlighting from other rows
            $(".po-row").removeClass("selected-row");

            // Highlight the selected row
            $(this).addClass("selected-row");

            // Save the selected PO ID to local storage
            localStorage.setItem("selectedPOID", clickedPOId);
        });
    }

    function highlightSelectedRowOnInit() {
        var selectedPOID = localStorage.getItem("selectedPOID");
        if (selectedPOID) {
            $(".po-row").each(function () {
                if ($(this).data("id").toString() === selectedPOID) {
                    $(this).addClass("selected-row");
                    return false; // Break the loop once the match is found
                }
            });
        }
    }

    $(function () {
        $(document).on('click', '.results_entry', function (e) {
            e.preventDefault();
            var resFinId = $(this).attr('data-id');
            var sendSMSUrl = "{% url 'send_sms_services' %}?id=" + resFinId;
            navigateTo(sendSMSUrl);
        });
    });
    //////////////////////////////////////////////////////////////////////

    // Define globally so it's accessible in both blocks
    function toggleGroupsBlock() {
        const classSelect = document.getElementById("id_is_class");
        const groupsBlock = document.getElementById("groups_block");

        const selectedOption = classSelect.options[classSelect.selectedIndex];
        const allowGroup = selectedOption.getAttribute("data-allow_group");

        if (allowGroup === "1" || allowGroup === "True" || allowGroup === "true") {
            groupsBlock.style.display = "block";
            $('#id_is_groups').prop('required', true);
            // Optionally: preserve or sync with filter, but do NOT reset
        } else {
            groupsBlock.style.display = "none";
            $('#id_is_groups').prop('required', false);
            $('#id_is_groups').val(""); // Only reset when hiding the block
        }
    }

    document.addEventListener("DOMContentLoaded", function () {
        const classSelect = document.getElementById("id_is_class");

        // Bind class change event
        classSelect.addEventListener("change", toggleGroupsBlock);

        // Sync group select when filter changes
        $('#id_is_groups').on('change', function () {
            const selectedGroup = $(this).val();
            $('#id_is_groups').val(selectedGroup);
        });

        // Optional: Initial sync
        $('#id_is_groups').val($('#id_is_groups').val());

        // Initial check on load
        toggleGroupsBlock();
    });

    /////////////

    $(document).ready(function () {

        $('#id_org').change(function () {
            OrgWiseSubOptions();
        });

        $('#id_is_class').change(function () {
            OrgWiseSubOptions();
        });

        $('#id_is_groups').change(function () {
            OrgWiseSubOptions();
        });

        OrgWiseSubOptions();

        function OrgWiseSubOptions() {
            var selectedOrgId = $('#id_org').val();
            var selectedClassId = $('#id_is_class').val();
            var selectedClassFilterId = $('#id_is_class_filter').val();
            var selectedGroupId = $('#id_is_groups').val();

            // Branch option value
            $.ajax({
                url: '/get_subjects_options/',
                method: 'GET',
                data: {
                    org_id: selectedOrgId,
                    class_id: selectedClassId,
                    groups_id: selectedGroupId,
                },
                success: function (data) {
                    $('#id_is_subjects').empty();
                    // Add default "Choose here" option
                    //$('#id_is_subjects').append('<option value="" selected disabled>Choose Subject here</option>');

                    // Append subject options
                    $.each(data.subOptions, function (index, subject) {
                        $('#id_is_subjects').append('<option value="' + subject.subjects_id + '" data-subjects_name="' + subject.subjects_name + '">' + subject.subjects_name + '</option>');
                    });

                    $('#id_is_subjects').trigger('change');
                    toggleGroupsBlock();
                },
                error: function (error) {
                    console.error('Error fetching subject options:', error);
                }
            });
        }
    });
    /////////////
    document.addEventListener('DOMContentLoaded', function () {
        const pubDateInput = document.getElementById('id_exam_date');

        if (pubDateInput) {
            const today = new Date();
            const yyyy = today.getFullYear();
            const mm = String(today.getMonth() + 1).padStart(2, '0');
            const dd = String(today.getDate()).padStart(2, '0');
            const formattedDate = `${dd}-${mm}-${yyyy}`; // Format: yyyy-mm-dd

            pubDateInput.value = formattedDate;
        }
    });
    ///////////////////////////////////////////
    $(document).ready(function () {

        $('#id_org').change(function () {
            OrgWiseUpdateFilterOptions();
        });

        OrgWiseUpdateFilterOptions();

        function OrgWiseUpdateFilterOptions() {
            var selectedOrgId = $('#id_org').val();

            // Branch option value
            $.ajax({
                url: '/get_branch_options/',
                method: 'GET',
                data: { org_id: selectedOrgId },
                success: function (data) {
                    $('#id_branchs').empty();
                    // Add default "Choose here" option
                    //$('#id_branchs').append('<option value="" selected disabled>Choose Branch here</option>');

                    // Append branch options
                    $.each(data.branch_list, function (index, branch) {
                        $('#id_branchs').append('<option value="' + branch.branch_id + '">' + branch.branch_name + '</option>');
                    });

                    $('#id_branchs').trigger('change');
                },
                error: function (error) {
                    console.error('Error fetching branch options:', error);
                }
            });
        }
    });
</script>
