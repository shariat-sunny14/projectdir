                                                        <!--  -->

                                                            <div class="card main-card">
                                                                <div class="card-body item_setup_sub">
                                                                    <div class="row cash_point_row" style="margin-top: -2px;">
                                                                        <label for="id_is_groups" class="col-sm-orgName col-form-label font_size_filter">
                                                                            Groups:

                                                                        <div class="col-orgInput">
                                                                            <select id="id_is_groups" name="is_groups_id" class="form-select item_inputbox"

                                            <div class="card main-card">
                                                <div class="card-body card-body_item_setup">
                                                    <div class="row row_item_setup">

                                                            <div class="card main-card">
                                                                <div class="card-body item_setup_sub">
                                                                    <div class="row cash_point_row" style="margin-top: -2px;">
                                                                        <label for="id_is_subjects" style="width: 5.85%;"

                                                                    <div class="row cash_point_row" style="margin-top: -2px;">
                                                                        <div class="addSubjectsButton">
                                                                            <button type="button" id="addSubjectsBtn" value="submit" class="btn btn-primary btn-sm"

                                                                                Add Subject

                                                                        </div>
                                                                    </div>
                                                                </div>
                                                            </div>
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                    <!--  -->
                                    <!--  -->
                                    <!-- Table 1: Class wise marit position -->
                                    <div class="row row_item_setup">
                                        <div class="col-sm-12">
                                            <div class="exam_modestb">
                                                <table id="subwisepolicytable" class="table table-striped table-hover">
                                                    <thead class="text-center table-header_itemlist">
                                                        <tr>
                                                            <th style="width: 5%;">Sl</th>
                                                            <th style="width: 20%;">Class Name</th>
                                                            <th style="width: 15%;">Groups Name</th>
                                                            <th style="width: 20%;">Subjects Name</th>
                                                            <th style="width: 10%;">Version</th>
                                                            <th style="width: 10%;">Subjects Position</th>
                                                            <th style="width: 12%;">Sub Groups</th>
                                                            <th style="width: 10%;">Action</th>
                                                        </tr>
                                                    </thead>
                                                    <tbody id="subwisepolicytbody" class="table-body-row" style="text-align:center; cursor: pointer;">

                                                </table>

                                    </div>
                                    <!--  -->
                                    <!--  -->
                                    <!-- submit button -->
                                    <div class="submit_button" style="margin-top: 5rem;">
                                        <button type="submit" id="subsSubmitBtn" value="submit" class="btn btn-success btn-sm"

<!--  -->
<script>
    $(document).ready(function () {
        // Page load বা filter change হলে call হবে
        loadSubjectWisePolicy();

        // যদি Org, Class, Group, Version filter থাকলে onchange এ reload করতে চাও
        //$('#id_org_sub, #id_is_class_sub, #id_is_groups, input[name="is_version_sub"]').on('change', function () {
        //    loadSubjectWisePolicy();
        //});
    });

    function loadSubjectWisePolicy() {
        $.ajax({
            url: '/get_subjectswise_merit_policy/',  // view URL
            method: 'GET',
            success: function (data) {
                let $tbody = $('#subwisepolicytbody');
                $tbody.empty(); // পুরোনো data remove

                let subjectCount = 0;

                $.each(data.policyList, function (index, item) {
                    subjectCount++;
                    let versionText = item.is_english ? 'English' : (item.is_bangla ? 'Bangla' : '');
                    let versionColor = item.is_english ? 'Green' : (item.is_bangla ? 'Blue' : '');
                    let newRow = `
                        <tr data-subject-id="${item.subjects_id}" style="color: ${versionColor};">
                            <td>${subjectCount}</td>
                            <td>
                                ${item.class_name}
                                <input type="hidden" name="is_class_sub[]" value="${item.class_id}">
                            </td>
                            <td>
                                ${item.group_name || 'N/A'}
                                <input type="hidden" name="is_groups_id[]" value="${item.groups_id || ''}">
                            </td>
                            <td>
                                ${item.subject_name}
                                <input type="hidden" name="subjects_id[]" value="${item.subjects_id}">
                                <input type="hidden" name="org_sub[]" value="${item.org_id}">
                            </td>
                            <td style="font-weight: bold;">
                                ${versionText}
                                <input type="hidden" name="is_version_sub[]" value="${versionText}">
                            </td>
                            <td>
                                <input type="text" name="subject_priority[]" class="form-control form-control-sm text-center" value="${item.subject_priority || ''}" style="background-color: #ffeed5;" autocomplete="off">
                            </td>
                            <td>
                                <input class="form-check-input" type="checkbox"  name="is_sub_groups[]" value="${item.subjects_id}" ${item.is_sub_groups ? 'checked' : ''} style="height: 1.5rem; width: 1.5rem;">
                            </td>
                            <td>
                                <button type="button" class="btn btn-danger btn-sm delete-row" data-subswisep_id="${item.subswisep_id}">X</button>
                            </td>
                        </tr>
                    `;
                    $tbody.append(newRow);
                });
            },
            error: function (err) {
                console.error('Error fetching subjects wise policy:', err);
            }
        });
    }


    // Row Delete Button Event (delegated)
    $(document).on("click", ".delete-row", function () {
        let subswisepId = $(this).data("subswisep_id");
        let $row = $(this).closest("tr");

        if (!confirm("Are you sure you want to delete this record?")) return;

        $.ajax({
            url: "/delete_subjectswise_policy/",  // Django view URL
            method: "POST",
            headers: {
                "X-CSRFToken": "{{ csrf_token }}"
            },
            data: { subswisep_id: subswisepId },
            success: function (resp) {
                if (resp.success) {
                    toastr.success(resp.msg);
                    $row.remove();  // table থেকে row remove
                    // পুনরায় serial update
                    let subjectCount = 0;
                    $("#subwisepolicytbody tr").each(function () {
                        subjectCount++;
                        $(this).find("td:first").text(subjectCount);
                    });
                } else {
                    toastr.error(resp.errmsg);
                }
            },
            error: function (err) {
                console.error("Error deleting record:", err);
            }
        });
    });

    ///////////////////////////////////////////////////////
    $(document).ready(function () {
        let subjectCount = 0;

        $("#addSubjectsBtn").on("click", function () {
            let $subjectSelect = $("#id_is_subjects");
            let selectedId = $subjectSelect.val();
            let selectedName = $subjectSelect.find("option:selected").text();

            let orgId   = $("#id_org_sub").val();
            let orgName = $("#id_org_sub option:selected").text();

            let classId   = $("#id_is_class_sub").val();
            let className = $("#id_is_class_sub option:selected").text();

            let groupId   = $("#id_is_groups").val();
            let groupName = $("#id_is_groups option:selected").text();

            let versionId   = $("input[name='is_version_sub']:checked").val();
            let versionName = $("input[name='is_version_sub']:checked").parent("label").text().trim();

            if (!selectedId) {
                toastr.warning("Please select a subject first!");
                return;
            }

            // Duplicate check
            if ($(`#subwisepolicytbody tr[data-subject-id="${selectedId}"]`).length > 0) {
                toastr.warning("This subject is already added!");
                return;
            }

            subjectCount++;
            let newRow = `
                <tr data-subject-id="${selectedId}">
                    <td>${subjectCount}</td>
                    <td>
                        ${className}
                        <input type="hidden" name="is_class_sub[]" value="${classId}">
                    </td>
                    <td>
                        ${groupName}
                        <input type="hidden" name="is_groups_id[]" value="${groupId}">
                    </td>
                    <td>
                        ${selectedName}
                        <input type="hidden" name="subjects_id[]" value="${selectedId}">
                        <input type="hidden" name="org_sub[]" value="${orgId}">
                    </td>
                    <td>
                        ${versionId}
                        <input type="hidden" name="is_version_sub[]" value="${versionId}">
                    </td>
                    <td>
                        <input type="text" name="subject_priority[]" class="form-control form-control-sm text-center" style="background-color: #ffeed5;" autocomplete="off">
                    </td>
                    <td>
                        <input class="form-check-input" type="checkbox" name="is_sub_groups[]" value="${selectedId}" style="height: 1.5rem; width: 1.5rem;">
                    </td>
                    <td>
                        <button type="button" class="btn btn-danger btn-sm remove-row">X</button>
                    </td>
                </tr>
            `;

            $("#subwisepolicytbody").append(newRow);
        });

        // Row Delete Button Event
        $(document).on("click", ".remove-row", function () {
            $(this).closest("tr").remove();

            // পুনরায় serial (Sl) reset করা
            subjectCount = 0;
            $("#subwisepolicytbody tr").each(function () {
                subjectCount++;
                $(this).find("td:first").text(subjectCount);
            });
        });
    });

    $(document).ready(function () {
        // Page load হলে subjects load হবে একটু delay দিয়ে
        setTimeout(function() {
            loadSubjectsOnPageLoad();
        }, 200); // 200ms delay, প্রয়োজন অনুযায়ী বাড়ানো/কমানো যাবে

        // Org, Class, Group change হলে call হবে
        $('#id_org_sub, #id_is_class_sub, #id_is_groups').on('change', function () {
            OrgWiseSubOptions();
        });

        // Version radio button change হলে call হবে
        $('input[name="is_version_sub"]').on('change', function () {
            OrgWiseSubOptions();
        });
    });

    function loadSubjectsOnPageLoad() {
        let selectedClassId = $('#id_is_class_sub').val();
        if (selectedClassId) {
            // class select already selected আছে, তাই OrgWiseSubOptions call
            OrgWiseSubOptions();
        }
    }

    function OrgWiseSubOptions() {
        let selectedOrgId = $('#id_org_sub').val();
        let selectedClassId = $('#id_is_class_sub').val();
        let selectedGroupId = $('#id_is_groups').val();
        let selectedIsVersion = $('input[name="is_version_sub"]:checked').val();

        if (!selectedClassId) {
            // যদি class select না করা থাকে, AJAX পাঠাবে না
            $('#id_is_subjects').empty();
            return;
        }

        $.ajax({
            url: '/get_subjects_options/',
            method: 'GET',
            data: { 
                org_id: selectedOrgId,
                class_id: selectedClassId,
                groups_id: selectedGroupId || '',
                is_version: selectedIsVersion,
            },
            success: function (data) {
                let $subject = $('#id_is_subjects');
                $subject.empty();

                $.each(data.subOptions, function (index, subject) {
                    $subject.append(
                        `<option value="${subject.subjects_id}" 
                                data-subjects_name="${subject.subjects_name}" 
                                data-is_optional="${subject.is_optional}">
                            ${subject.subjects_name}
                        </option>`
                    );
                });

                // ডিফল্টভাবে প্রথম subject select হবে
                if ($subject.find("option").length > 0) {
                    $subject.val($subject.find("option:first").val());
                }
            },
            error: function (err) {
                console.error("Error fetching subjects:", err);
            }
        });
    }

    $(function () {
        $('#SubjectsWiseMeritPolicyForm').submit(function (e) {
            e.preventDefault();

            $('#subsSubmitBtn').prop('disabled', true).html('<i class="bx bx-loader-circle"></i> Processing');

            $.ajax({
                headers: {
                    "X-CSRFToken": '{{csrf_token}}'
                },
                url: "{% url 'save_subjectswise_merit_policy' %}",
                data: new FormData($(this)[0]),
                cache: false,
                contentType: false,
                processData: false,
                method: 'POST',
                dataType: 'json',
                success: function (resp) {
                    if (resp.success) {
                        toastr.success(resp.msg);
                        setTimeout(function () {
                            location.reload();
                        }, 300);
                    } else {
                        toastr.error(resp.errmsg);
                    }
                },
                complete: function () {
                    setTimeout(function () {
                        $('#subsSubmitBtn').prop('disabled', false).html('Save & Update');
                    }, 3000);
                }
            });
        });
    });
</script>
