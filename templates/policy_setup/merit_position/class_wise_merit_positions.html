<section  class="container-fluid" style="margin-top: 0.5rem; margin-bottom:0.5rem;">
    <section style="border: 1px solid rgba(0, 0, 0, .125); border-top: none; border-radius: 0.3rem;">
        <div style="border: 1px solid rgba(0, 0, 0, .125);
            margin-bottom: 0.5rem;
            border-left: none;
            border-right: none;
            border-top-left-radius: 0.3rem;
            border-top-right-radius: 0.3rem;
            background: #455697;">
            <!-- Main Heading -->
            <div class="row" style="display: flex; justify-content: center; text-align: center; align-items: center;">
                <div class="col col-md-4 col-md-6 dashboar-head">
                    <div class="d-sm-flex align-items-center mb-2" style="margin-left: 0.5rem;">
                        <i class='bx bx-book-alt text-white req-head-icon'></i>
                        <h1 class="h3 text-white req-head">Class Wise Merit Positions Policy</h1>
                    </div>
                </div>
            </div>
        </div>
        <!--  -->
        <section>
            <div class="row row_item_setup">
                <!-- form 1 -->
                <div class="col-sm-12">
                    <div class="card main-card">
                        <div class="card-body card-body_item_setup">
                            <div class="itemsetup_container">
                                <form action="" method="" id="ClasswiseMeritPolicyForm">
                                    <div class="add_edit_head" style="justify-content: left;">
                                        <h2 class="text-primary" style="margin-left: 2rem;">Class Wise Merit Positions Policy Information</h2>
                                    </div>
                                    <!--  -->
                                    <div class="row row_item_setup">
                                        <div class="col-sm-12">
                                            <div class="card main-card">
                                                <div class="col-sm-12">
                                                    <div class="card main-card">
                                                        <div class="card-body card-body_item_setup" style="padding: 0rem 0rem; display: flex; flex-direction: row; flex-wrap: wrap; justify-content: flex-end; align-items: center; align-content: center;">
                                                            <div class="item_setupflag" style="display: flex; margin-right: 1rem; justify-content: right;">
                                                                <label class="form-check-label setupflag_label" for="id_is_english">
                                                                    Is English:
                                                                </label>
                                                                <input class="form-check-input" type="radio" id="id_is_english" name="is_version" value="english" checked>
                                                            </div>
                                                            <!--  -->
                                                            <div class="item_setupflag" style="display: flex; margin-right: 1rem; justify-content: right;">
                                                                <label class="form-check-label setupflag_label" for="id_is_bangla">
                                                                    Is Bangla:
                                                                </label>
                                                                <input class="form-check-input" type="radio" id="id_is_bangla" name="is_version" value="bangla">
                                                            </div>
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                        <!--  -->
                                        <div class="col-sm-12">
                                            <div class="card main-card">
                                                <div class="card-body card-body_item_setup">
                                                    <div class="row row_item_setup">
                                                        <div class="col-sm-6">
                                                            <div class="card main-card">
                                                                <div class="card-body item_setup_sub">
                                                                    <div class="row cash_point_row"
                                                                        style="margin-top: -2px;">
                                                                        <label for="id_org"
                                                                            class="col-sm-orgName col-form-label font_size_filter required">
                                                                            Org:
                                                                        </label>
                                                                        <div class="col-orgInput">
                                                                            <select id="id_org" name="org" class="form-select item_inputbox" aria-label="Default select example" required>
                                                                                {% for org in user_org_list %}
                                                                                <option value="{{org.org_id}}">
                                                                                    {{ org.org_name }}
                                                                                </option>
                                                                                {% endfor %}
                                                                            </select>
                                                                        </div>
                                                                    </div>
                                                                </div>
                                                            </div>
                                                        </div>
                                                        <!--  -->
                                                        <!--  -->
                                                        <div class="col-sm-6">
                                                            <div class="card main-card">
                                                                <div class="card-body item_setup_sub">
                                                                    <div class="row cash_point_row" style="margin-top: -2px;">
                                                                        
                                                                    </div>
                                                                </div>
                                                            </div>
                                                        </div>
                                                    </div>
                                                    <!--  -->
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                    <!--  -->
                                    <!--  -->
                                    <!-- Table 1: Class wise marit position -->
                                    <div class="row row_item_setup">
                                        <div class="col-sm-12">
                                            <div class="exam_modestb" style="margin-top: 0.5rem;">
                                                <table id="policyTable" class="table table-striped table-hover" style="width: 100%;">
                                                    <thead class="text-center table-header_itemlist">
                                                        <tr>
                                                            <th style="width: 5%;">Sl</th>
                                                            <th style="width: 20%;">Class Name</th>
                                                            <th style="width: 15%;">GPA Position</th>
                                                            <th style="width: 15%;">Obtained Marks Position</th>
                                                            <th style="width: 15%;">Roll No Position</th>
                                                            <th style="width: 15%;">Apply Fail Sub Count?</th>
                                                            <th style="width: 15%;">Gross Merit Position?</th>
                                                        </tr>
                                                    </thead>
                                                    <tbody id="MODESTB" class="table-body-row" style="text-align:center; cursor: pointer;">
                                                        {% for class in classes %}
                                                        <tr data-classid="{{ class.class_id }}">
                                                            <td>{{ forloop.counter }}</td>
                                                            <td style="text-align:left;">
                                                                {{ class.class_name }}
                                                                <input type="hidden" name="class_id[]" value="{{ class.class_id }}">
                                                            </td>
                                                            <td>
                                                                <input type="number" class="form-control item_inputbox gpa_priority" name="is_average_gpa_priority[]" placeholder="Example Position 1" style="text-align: center;">
                                                            </td>
                                                            <td>
                                                                <input type="number" class="form-control item_inputbox marks_priority" name="total_obtained_marks_priority[]" placeholder="Example Position 2" style="text-align: center;">
                                                            </td>
                                                            <td>
                                                                <input type="number" class="form-control item_inputbox roll_priority" name="roll_no_priority[]" placeholder="Example Position 3" style="text-align: center;">
                                                            </td>
                                                            <td>
                                                                <input class="form-check-input fail_sub_count_priority" type="checkbox" name="is_fail_sub_count[]" value="{{ class.class_id }}" style="height: 1.5rem; width: 1.5rem;">
                                                            </td>
                                                            <td>
                                                                <input class="form-check-input gross_merit_position" type="checkbox" name="is_gross_merit_position[]" value="{{ class.class_id }}" style="height: 1.5rem; width: 1.5rem;">
                                                            </td>
                                                        </tr>
                                                        {% endfor %}
                                                    </tbody>
                                                </table>
                                            </div>
                                        </div>    
                                    </div>
                                    <!--  -->
                                    <!--  -->
                                    <!-- submit button -->
                                    <div class="submit_button" style="margin-top: 5rem;">
                                        <button type="submit" id="submitBtn" value="submit" class="btn btn-success btn-sm"
                                            style="margin-right: 10px;">
                                            Save & Update
                                        </button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </section>
</section>
<!--  -->
<script>
    $(document).ready(function () {

        function loadMeritPolicy(is_version) {
            $.ajax({
                url: "{% url 'get_class_wise_merit_policy_data' %}",
                type: "GET",
                data: {
                    is_version: is_version
                },
                success: function (response) {
                    let policy_map = response.policy_map;

                    // table update
                    $("#MODESTB tr").each(function () {
                        let class_id = $(this).data("classid");
                        let policy = policy_map[class_id];

                        if (policy) {
                            $(this).find(".gpa_priority").val(policy.is_average_gpa_priority);
                            $(this).find(".marks_priority").val(policy.total_obtained_marks_priority);
                            $(this).find(".roll_priority").val(policy.roll_no_priority);
                            $(this).find(".fail_sub_count_priority").prop("checked", policy.is_fail_sub_count);
                            $(this).find(".gross_merit_position").prop("checked", policy.is_gross_merit_position);
                        } else {
                            // যদি policy না থাকে তাহলে ফিল্ড ফাঁকা করে দিবো
                            $(this).find(".gpa_priority").val("");
                            $(this).find(".marks_priority").val("");
                            $(this).find(".roll_priority").val("");
                            $(this).find(".fail_sub_count_priority").prop("checked", false);
                            $(this).find(".gross_merit_position").prop("checked", false);
                        }
                    });
                }
            });
        }

        // প্রথমে default load হবে english দিয়ে
        loadMeritPolicy("english");

        // radio change করলে আবার লোড হবে
        $("input[name='is_version']").change(function () {
            let selectedVersion = $(this).val();
            loadMeritPolicy(selectedVersion);
        });

    });


    $(function () {
        $('#ClasswiseMeritPolicyForm').submit(function (e) {
            e.preventDefault();

            $('#submitBtn').prop('disabled', true).html('<i class="bx bx-loader-circle"></i> Processing');

            $.ajax({
                headers: {
                    "X-CSRFToken": '{{csrf_token}}'
                },
                url: "{% url 'save_classwise_merit_policy' %}",
                data: new FormData($(this)[0]),
                cache: false,
                contentType: false,
                processData: false,
                method: 'POST',
                type: 'POST',
                dataType: 'json',
                success: function (resp) {
                    if (success = resp.msg) {
                        toastr.success(resp.msg)
                        setTimeout(function () {
                            location.reload()
                        }, 300);
                    } else {
                        toastr.error(resp.errmsg);
                    }
                },
                complete: function () {
                    setTimeout(function () {
                        $('#submitBtn').prop('disabled', false).html('Save & Update');
                    }, 3000);
                }
            })
        })
    });
</script>
