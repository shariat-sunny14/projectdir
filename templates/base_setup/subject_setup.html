<script>
    //
    // Define globally so it's accessible in both blocks
    function toggleGroupsBlock() {
        const classSelect = document.getElementById("id_is_class");
        const groupsBlock = document.getElementById("groups_block");

        const selectedOption = classSelect.options[classSelect.selectedIndex];
        const allowGroup = selectedOption.getAttribute("data-allow_group");

        if (allowGroup === "1" || allowGroup === "True" || allowGroup === "true") {
            groupsBlock.style.display = "block";
            $('#id_is_groups').prop('required', true);
        } else {
            groupsBlock.style.display = "none";
            $('#id_is_groups').prop('required', false);
            $('#id_is_groups').val("");  // Clear selection if hidden
        }
    }

    function toggleGroupsBlockFilter() {
        const classSelectFilter = document.getElementById("id_class_name_filter");
        const groupsBlock = document.getElementById("groups_block");
        const groupsBlockFilter = document.getElementById("groups_block_filter");

        const selectedOptionFilter = classSelectFilter.options[classSelectFilter.selectedIndex];
        const allowGroupFilter = selectedOptionFilter.getAttribute("data-allow_group_filter");

        if (allowGroupFilter === "1" || allowGroupFilter === "True" || allowGroupFilter === "true") {
            groupsBlockFilter.style.display = "flex";
        } else {
            groupsBlockFilter.style.display = "none";
            $('#id_groups_name_filter').val(""); // Clear if hidden
        }

        if (allowGroupFilter === "1" || allowGroupFilter === "True" || allowGroupFilter === "true") {
            groupsBlock.style.display = "block";
            $('#id_is_groups').prop('required', true);
        } else {
            groupsBlock.style.display = "none";
            $('#id_is_groups').prop('required', false);
            $('#id_is_groups').val("");  // Clear selection if hidden
        }
    }

    document.addEventListener("DOMContentLoaded", function () {
        const classSelect = document.getElementById("id_is_class");
        const classSelectFilter = document.getElementById("id_class_name_filter");

        // Bind events
        classSelect.addEventListener("change", toggleGroupsBlock);
        classSelectFilter.addEventListener("change", toggleGroupsBlockFilter);

        // Initial run
        toggleGroupsBlock();
        toggleGroupsBlockFilter();
    });
    //
    $(document).ready(function () {
        // Define a function to populate the table with data
        function subjectsPopulateTable(data) {
            for (var i = 0; i < data.subjectsDtls.length; i++) {
                var subjectsData = data.subjectsDtls[i];

                $("#id_subjects_id").val(subjectsData.subjects_id);
                $("#id_subjects_no").val(subjectsData.subjects_no);
                $("#id_subjects_name").val(subjectsData.subjects_name);
                $("#id_is_marks").val(subjectsData.is_marks);

                $("#id_subjects_org option").filter(function () {
                    return $(this).text().trim() === subjectsData.org_name.trim();
                }).prop("selected", true);

                $("#id_is_class option").filter(function () {
                    return $(this).text().trim() === subjectsData.is_class_name.trim();
                }).prop("selected", true).trigger("change");

                $("#id_is_groups option").filter(function () {
                    return $(this).text().trim() === (subjectsData.is_groups_name || "").trim();
                }).prop("selected", true);

                $("#id_is_active_subjects").prop("checked", subjectsData.is_active);

                // This is now safe to call because it's globally defined
                toggleGroupsBlock();
            }
        }

        // Fetch data from your Django view using AJAX
        $(document).on("click", ".subjects_editBtn", function () {
            var subjectsID = $(this).data("subjects_id"); // Get the item_id from the data attribute

            $.ajax({
                type: "GET",
                url: "/select_subjects_data/" + subjectsID + "/",
                dataType: "json",
                success: function (data) {
                    subjectsPopulateTable(data);
                },
                error: function (xhr, status, error) {
                    console.log("AJAX Error:", error);
                    toastr.warning("Failed to fetch Item UoM details");
                }
            });
        });

    });

    //<!--  -->
    $(document).ready(function () {
        // Load initial data based on the initially checked radio button
        loadInitialSubjectsData();
        handleSubjectsRowSelection();

        // Add event listeners to radio buttons
        $('input[name="subjectsoption"]').change(function () {
            localStorage.setItem('subjectslistOption', $('input[name="subjectsoption"]:checked').val());

            // Load items
            loadSubjectslist();
        });

        $('#id_subjects_org_filter').change(() => {
            // Save the selected organization filter value to local storage
            //subjectsOrgFilterValue = $('#id_subjects_org_filter').val();
            // Load items
            loadSubjectslist();
        });

        $('#id_class_name_filter').change(() => {
            loadSubjectslist();
        });

        $('#id_groups_name_filter').change(() => {
            loadSubjectslist();
        });


        // Load items based on the search query
        loadSubjectsFromSearch();

        // Function to load items based on the search query
        function loadSubjectsFromSearch() {
            // Get the search query from local storage if it exists
            var savedSubjectsSearchQuery = localStorage.getItem("subjectsSearchQuery");
            var subjectsListsearch = $('#SubjectSearch');

            // Check if there's a saved search query
            if (savedSubjectsSearchQuery) {
                // Set the search input value
                subjectsListsearch.val(savedSubjectsSearchQuery);
            }

            // Add an event listener to the search input field
            subjectsListsearch.on('input', function () {
                var query = $(this).val();
                localStorage.setItem("subjectsSearchQuery", query);
                loadSubjectslist();
            });

            // Trigger the search on page load
            loadSubjectslist();
        }

        function loadInitialSubjectsData() {
            // Retrieve the selected option from local storage
            var groupsinitialOption = localStorage.getItem('subjectslistOption') || 'true';

            // Check the corresponding radio button
            $('input[name="subjectsoption"][value="' + groupsinitialOption + '"]').prop('checked', true);

            // Load items
            loadSubjectslist();
        }

        function loadSubjectslist() {
            var subjectsSearchQuery = localStorage.getItem("subjectsSearchQuery") || '';
            var subjectsoption = localStorage.getItem('subjectslistOption') || 'true';
            var subjectsOrgFilterValue = $('#id_subjects_org_filter').val();
            var classNameFilterValue = $('#id_class_name_filter').val();
            var groupsNameFilterValue = $('#id_groups_name_filter').val();
        
            $.ajax({
                type: 'GET',
                url: '/get_list_of_subjects_data/',
                data: {
                    'subjectsoption': subjectsoption,
                    'subjects_search_query': subjectsSearchQuery,
                    'subjects_org_filter': subjectsOrgFilterValue,
                    'class_name_filter': classNameFilterValue,
                    'groups_name_filter': groupsNameFilterValue,
                },
                success: function (data) {
                    updateSubjectsTable(data);
                },
                error: function (xhr, status, error) {
                    console.log('Ajax Error:', xhr.responseText);
                }
            });
        }

        function updateSubjectsTable(data) {
            var tableBody = $('#subjectsTB');
            tableBody.empty();

            if (data.data && data.data.length === 0) {
                $('#noDataFoundRow').show();
            } else {
                $('#noDataFoundRow').hide();

                if (data.data) {
                    $.each(data.data, function (index, subjectsL) {
                        var subjectsstatusText = subjectsL.is_active ? 'Active' : 'Inactive';
                        var subjectsstatusClass = subjectsL.is_active ? 'active-status' : 'inactive-status';

                        tableBody.append(`<tr class="subjects_editBtn" data-subjects_id="${subjectsL.subjects_id}">
                            <td style="text-align: center;">${subjectsL.subjects_no}</td>
                            <td style="text-align: left;">${subjectsL.subjects_name}</td>
                            <td style="text-align: left;">${subjectsL.org_name}</td>
                            <td class="status_act_inac ${subjectsstatusClass}" style="text-align: center;">${subjectsstatusText}</td>
                        </tr>`);
                    });
                }
            }
            // Check if there is a selected item ID in local storage and highlight the row
            handleSubjectsRowSelection();
        }

        $(function () {
            $('#subjectsForm').submit(function (e) {
                e.preventDefault();
                var formData = new FormData($(this)[0]);

                $.ajax({
                    headers: {
                        "X-CSRFToken": '{{csrf_token}}'
                    },
                    url: "{% url 'subjects_save_and_update' %}",
                    data: formData,
                    cache: false,
                    contentType: false,
                    processData: false,
                    method: 'POST',
                    type: 'POST',
                    dataType: 'json',
                    success: function (resp) {
                        if (success = resp.msg) {
                            toastr.success(resp.msg);
                            loadSubjectslist();
                            showSubjectsLoader();
                            resetSubjectsForm();
                            // Hide loader
                            setTimeout(function () {
                                hideSubjectsLoader();
                            }, 1100);

                        } else {
                            toastr.error(resp.errmsg);
                        }
                    }
                });
            });
        });
    });

    function handleSubjectsRowSelection() {
        // Check if there is a selected item ID in local storage and highlight the row
        var selectedSubjectsID = localStorage.getItem("selectedSubjectsID");
        if (selectedSubjectsID) {
            $(".subjects_editBtn").removeClass("selected-row");
            $(".subjects_editBtn[data-subjects_id='" + selectedSubjectsID + "']").addClass("selected-row");
        }

        // Add an event listener to the item rows
        $(document).on("click", ".subjects_editBtn", function () {
            var clickedSubjectsID = $(this).data("subjects_id");
            $(".subjects_editBtn").removeClass("selected-row");
            $(this).addClass("selected-row");

            // Save the selected item ID to local storage
            localStorage.setItem("selectedSubjectsID", clickedSubjectsID);
        });
    }

    //==========================================
    //loader 
    const loader_subjects = document.querySelector(".loader_subjects");
    const loaderBody_subjects = document.querySelector(".loader-body_subjects");

    // Function to show the loader
    function showSubjectsLoader() {
        loader_subjects.style.display = "block";
        loaderBody_subjects.style.display = "block";
        loader_subjects.style.left = "50%"; // Set left position to center
        loader_subjects.style.top = "50%"; // Set top position to center
    }

    // Function to hide the loader
    function hideSubjectsLoader() {
        loader_subjects.style.display = "none";
        loaderBody_subjects.style.display = "none";
    }

    // Function to check and show loader based on local storage
    function checkAndshowSubjectsLoader() {
        const loaderVisible = localStorage.getItem("loaderVisible");
        if (loaderVisible === "true") {
            showSubjectsLoader();
        }
    }

    // Event listener for radio button change
    document.querySelectorAll('input[name="subjectsoption"]').forEach(radio => {
        radio.addEventListener('change', function () {
            showSubjectsLoader(); // Show loader when radio button changes
            // Add logic to handle the radio button change if needed
            setTimeout(() => {
                hideSubjectsLoader(); // Hide loader after a delay (you can adjust this)
            }, 1100); // Example: hide loader after 2 seconds
        });
    });

    // Check and show loader on page load
    checkAndshowSubjectsLoader();

    window.addEventListener("load", () => {
        // Adjust the delay in milliseconds (e.g., 2000 for 2 seconds)
        setTimeout(() => {
            hideSubjectsLoader();
        }, 1100);
    });
    //loader
    //==========================================

    function resetSubjectsForm() {
        $('#subjectsForm')[0].reset();
        $('#id_subjects_id').val('');
    }
