<section  class="container-fluid" style="margin-top: 0.5rem; margin-bottom:0.5rem;">
    <section style="border: 1px solid rgba(0, 0, 0, .125); border-top: none; border-radius: 0.3rem;">
        <div style="border: 1px solid rgba(0, 0, 0, .125);
            margin-bottom: 0.5rem;
            border-left: none;
            border-right: none;
            border-top-left-radius: 0.3rem;
            border-top-right-radius: 0.3rem;
            background: #455697;">
            <!-- Main Heading -->
            <div class="row" style="display: flex; justify-content: center; text-align: center; align-items: center;">
                <div class="col col-md-4 col-md-6 dashboar-head">
                    <div class="d-sm-flex align-items-center mb-2" style="margin-left: 0.5rem;">
                        <i class='bx bx-book-alt text-white req-head-icon'></i>
                        <h1 class="h3 text-white req-head">Shift Setup</h1>
                    </div>
                </div>
            </div>
        </div>
        <!--  -->
        <section>
            <div class="row row_item_setup">
                <div class="col-sm-5">
                    <div class="card main-card">
                        <div class="card-body card-body_item_setup">
                            <div class="itemfilter_container">
                                <div class="filter_head">
                                    <h2 class="text-warning">Filtering</h2>
                                </div>
                                <!--  -->
                                <div class="row">
                                    <div class="col-sm-12">
                                        <div class="card main-card">
                                            <div class="card-body card-body_item_setup"
                                                style="display: flex; justify-content: center; border-bottom: 1px solid rgb(211, 211, 211);">
                                                <div class="form-check form-check-inline inline_item">
                                                    <input class="form-check-input radio2" type="radio" name="shiftoption"
                                                        value="true" id="shiftActive">
                                                    <label class="form-check-label" for="shiftActive">Active</label>
                                                </div>
                                                <div class="form-check form-check-inline inline_item">
                                                    <input class="form-check-input radio3" type="radio" name="shiftoption"
                                                        value="false" id="shiftInactive">
                                                    <label class="form-check-label" for="shiftInactive">Inactive</label>
                                                </div>
                                                <div class="form-check form-check-inline inline_item">
                                                    <input class="form-check-input radio1" type="radio" name="shiftoption"
                                                        value="1" id="shiftAll">
                                                    <label class="form-check-label" for="shiftAll">All</label>
                                                </div>
                                                <div class="form-check form-check-inline"
                                                    style="position: relative; z-index: 1; margin-bottom: 6px;">
                                                    <a href="/examination_category_setup_services/"
                                                        class="btn btn-danger text-white btn-xs item_del_btn">
                                                        Clear
                                                    </a>
                                                </div>
                                                
                                            </div>
                                            <!--  -->
                                            <div class="container col-sm-12" style="margin-top: 1rem; margin-bottom: 1rem;">
                                                <div class="row org-filterRow">
                                                    <label for="id_org_filter" class="col-org_filter col-form-label font_size_filter">
                                                        Org Name:
                                                    </label>
                                                    <div class="col-sm-10">
                                                        <select id="id_org_filter" name="org_filter" class="form-select item_inputbox"
                                                            aria-label="Default select example">
                                                            {% for org in org_list %}
                                                            <option value="{{org.org_id}}">
                                                                {{ org.org_name }}
                                                            </option>
                                                            {% endfor %}
                                                        </select>
                                                    </div>
                                                </div>
                                                <!--  -->
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <!--  -->
                    <div class="card main-card">
                        <div class="card-body card-body_item_setup">
                            <div class="itemfilter_container">
                                <div class="filter_head">
                                    <h2 class="text-success">List of Shifts</h2>
                                </div>
                                <!--  -->
                                <div class="row">
                                    <div class="col-sm-12">
                                        <div class="card main-card">
                                            <div class="card-body card-body_item_setup">
                                                <!--  -->
                                                <div class="type_type">
                                                    <table id="" class="table table-striped table-hover" style="width: 100%;">
                                                        <thead class="text-center table-header_itemlist">
                                                            <tr>
                                                                <th style="text-align:center; width: 20%;">Shift No.</th>
                                                                <th style="text-align:center; width: 30%;">Shift Name</th>
                                                                <th style="text-align:center; width: 35%;">Organizations</th>
                                                                <th style="text-align:center; width: 15%;">Status</th>
                                                            </tr>
                                                            <tr>
                                                                <th colspan="4"
                                                                    style="text-align:center; background: #fff !important;">
                                                                    <input type="search" id="shiftsearch"
                                                                        class="form-control search_control item_inputbox"
                                                                        style="margin-left: 4px; background:#fffab6;"
                                                                        placeholder="Searching ..." autocomplete="off">
                                                                </th>
                                                            </tr>
                                                        </thead>

                                                        <tbody id="shiftTB" class="table-body-row"
                                                            style="text-align:center; cursor: pointer;">

                                                        </tbody>
                                                        <!-- loader start -->
                                                        <section class="loader-shift">
                                                            <div class="loader-body_shift">
                                                                <div class="loader_shift">
                                                                    <div class="upper ball"></div>
                                                                    <div class="right ball"></div>
                                                                    <div class="lower ball"></div>
                                                                    <div class="left ball"></div>
                                                                </div>
                                                            </div>
                                                        </section>
                                                        <!-- loader end -->
                                                    </table>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <!-- Item type main entry form -->

                <!-- form 1 -->
                <div class="col-sm-7">
                    <div class="card main-card">
                        <div class="card-body card-body_item_setup">
                            <div class="itemsetup_container">
                                <form action="" method="" id="shiftForm">
                                    <input type="hidden" id="id_shift_id" name="shift_id" value="">
                                    <div class="add_edit_head">
                                        <h2 class="text-primary">Add/Update Shifts Information</h2>
                                    </div>
                                    <!--  -->
                                    <div class="row row_item_setup">
                                        <div class="col-sm-12">
                                            <div class="card main-card">
                                                <div class="card-body card-body_item_setup">
                                                    <div class="item_setupflag"
                                                        style="display: flex; justify-content: right;">
                                                        <label class="form-check-label text-danger setupflag_label"
                                                            for="id_is_active_shift">
                                                            Active?
                                                        </label>
                                                        <input class="form-check-input" type="checkbox" id="id_is_active_shift"
                                                            name="is_active" value="1" aria-label="..." checked>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                        <!--  -->
                                        <div class="col-sm-12">
                                            <div class="card main-card">
                                                <div class="card-body card-body_item_setup">
                                                    <div class="row row_item_setup">
                                                        <div class="col-sm-5">
                                                            <div class="card main-card">
                                                                <div class="card-body item_setup_sub">
                                                                    <div class="row cash_point_row">
                                                                        <label for="id_shift_no"
                                                                            class="col-sm-4 col-form-label font_size_filter required">
                                                                            Shift No:
                                                                        </label>
                                                                        <div class="col-sm-8">
                                                                            <input type="text"
                                                                                class="form-control item_inputbox"
                                                                                id="id_shift_no" name="shift_no"
                                                                                autocomplete="off" required>
                                                                        </div>
                                                                    </div>
                                                                </div>
                                                            </div>
                                                        </div>
                                                        <!--  -->
                                                        <div class="col-sm-7">
                                                            <div class="card main-card">
                                                                <div class="card-body item_setup_sub">
                                                                    <div class="row cash_point_row"
                                                                        style="margin-top: -2px;">
                                                                        <label for="id_shift_name"
                                                                            class="col-sm-3 col-form-label font_size_filter required">
                                                                            Shift Name:
                                                                        </label>
                                                                        <div class="col-sm-9">
                                                                            <input type="text"
                                                                                class="form-control item_inputbox"
                                                                                id="id_shift_name" name="shift_name"
                                                                                autocomplete="off" required>
                                                                        </div>
                                                                    </div>
                                                                </div>
                                                            </div>
                                                        </div>
                                                        <!--  -->
                                                    </div>
                                                    <!--  -->
                                                    <div class="row row_item_setup">
                                                        <div class="col-sm-12">
                                                            <div class="card main-card">
                                                                <div class="card-body item_setup_sub">
                                                                    <div class="row cash_point_row"
                                                                        style="margin-top: -2px;">
                                                                        <label for="id_org_shifts"
                                                                            class="col-sm-orgName col-form-label font_size_filter required">
                                                                            Org Name:
                                                                        </label>
                                                                        <div class="col-orgInput">
                                                                            <select id="id_org_shifts" name="org" class="form-select item_inputbox"
                                                                                aria-label="Default select example" required>
                                                                                <option value="" selected disabled>Choose Organization ...</option>
                                                                                {% for org in org_list %}
                                                                                <option value="{{org.org_id}}">
                                                                                    {{ org.org_name }}
                                                                                </option>
                                                                                {% endfor %}
                                                                            </select>
                                                                        </div>
                                                                    </div>
                                                                </div>
                                                            </div>
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>

                                    <!-- submit button -->
                                    <div class="submit_button">
                                        <button type="button" class="btn btn-primary btn-sm" style="margin-right: 10px;" onclick="location.href='/type_uom_category';">
                                            New
                                        </button>
                                        <button type="button" class="btn btn-danger btn-sm" style="margin-right: 10px;"
                                            onclick="resetShiftForm();">
                                            Clear
                                        </button>
                                        <button type="submit" value="submit" class="btn btn-success btn-sm"
                                            style="margin-right: 10px;">
                                            Save & Update
                                        </button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </section>
</section>
<!--  -->
<script>
    $(document).ready(function () {
        // Define a function to populate the table with data
        function shiftPopulateTable(data) {

            // item history
            for (var i = 0; i < data.shiftsDtls.length; i++) {
                var shiftDtls = data.shiftsDtls[i];

                var shift_id = shiftDtls.shift_id;
                var shift_no = shiftDtls.shift_no;
                var shift_name = shiftDtls.shift_name;
                var org_name = shiftDtls.org_name;
                var is_active = shiftDtls.is_active;

                // Get the checkbox input element by its ID
                var is_activeCheckbox = document.getElementById("id_is_active_shift");

                // Set the checked attribute based on the is_active value
                is_activeCheckbox.checked = is_active;

                $("#id_shift_id").val(shift_id);
                $("#id_shift_no").val(shift_no);
                $("#id_shift_name").val(shift_name);
                // Get the select element
                var orgSelectShifts = $("#id_org_shifts");
                // Find the option with the corresponding text and set it as selected
                orgSelectShifts.find('option:contains("' + org_name + '")').prop('selected', true);

                console.log("shift_list:", shiftDtls);
            }
        }

        // Fetch data from your Django view using AJAX
        $(document).on("click", ".shift_editBtn", function () {
            var shiftID = $(this).data("shift-id"); // Get the item_id from the data attribute

            $.ajax({
                type: "GET",
                url: "/select_shifts_data/" + shiftID + "/",
                dataType: "json",
                success: function (data) {
                    shiftPopulateTable(data);
                },
                error: function (xhr, status, error) {
                    console.log("AJAX Error:", error);
                    toastr.warning("Failed to fetch Item Type details");
                }
            });
        });

    });

    //<!--  -->
    $(document).ready(function () {
        // Load initial data based on the initially checked radio button
        loadInitialShiftData();
        handleShiftRowSelection();

        // Add event listeners to radio buttons
        $('input[name="shiftoption"]').change(() => {
            // Save the selected option to local storage
            localStorage.setItem('shiftlistOption', $('input[name="shiftoption"]:checked').val());
        
            // Load items
            loadshiftlist();
        });

        $('#id_org_filter').change(() => {
            // Save the selected organization filter value to local storage
            orgFilterValue = $('#id_org_filter').val();
            // Load items
            loadshiftlist();
        });

        // Load items based on the search query
        loadshiftFromSearch();

        // Function to load items based on the search query
        function loadshiftFromSearch() {
            // Get the search query from local storage if it exists
            var savedShiftsearchQuery = localStorage.getItem("ShiftsearchQuery");
            var shiftListsearch = $('#shiftsearch');

            // Check if there's a saved search query
            if (savedShiftsearchQuery) {
                // Set the search input value
                shiftListsearch.val(savedShiftsearchQuery);
            }

            // Add an event listener to the search input field
            shiftListsearch.on('input', function () {
                var query = $(this).val();
                localStorage.setItem("ShiftsearchQuery", query);
                loadshiftlist();
            });

            // Trigger the search on page load
            loadshiftlist();
        }

        function loadInitialShiftData() {
            // Retrieve the selected option from local storage
            var typeinitialOption = localStorage.getItem('shiftlistOption') || 'true';

            // Check the corresponding radio button
            $('input[name="shiftoption"][value="' + typeinitialOption + '"]').prop('checked', true);

            // Load items
            loadshiftlist();
        }

        function loadshiftlist() {
            var ShiftsearchQuery = localStorage.getItem("ShiftsearchQuery") || '';
            var shiftoption = localStorage.getItem('shiftlistOption') || 'true';
            var orgFilterValue = $('#id_org_filter').val();
    
            $.ajax({
                type: 'GET',
                url: '/get_list_of_shifts_data/',
                data: {
                    'shiftoption': shiftoption,
                    'shift_search_query': ShiftsearchQuery,
                    'org_filter': orgFilterValue,
                },
                success: function (data) {
                    // Update the table with filtered data
                    updateShiftTable(data);
                },
                error: function (xhr, status, error) {
                    console.log('Ajax Error:', xhr.responseText);
                    console.log('Status:', status);
                    console.log('Error:', error);
                }
            });
        }

        function updateShiftTable(data) {
            var tableBody = $('#shiftTB');
            tableBody.empty();
    
            if (data.data && data.data.length === 0) {
                $('#noDataFoundRow').show();
            } else {
                $('#noDataFoundRow').hide();
    
                if (data.data) {
                    $.each(data.data, function (index, shiftL) {
                        var statusText = shiftL.is_active ? 'Active' : 'Inactive';
                        var statusClass = shiftL.is_active ? 'active-status' : 'inactive-status';
    
                        tableBody.append(`<tr class="shift_editBtn" data-shift-id="${shiftL.shift_id}">
                            <td style="text-align: center;">${shiftL.shift_no}</td>
                            <td style="text-align: left;">${shiftL.shift_name}</td>
                            <td style="text-align: left;">${shiftL.org_name}</td>
                            <td class="status_act_inac ${statusClass}" style="text-align: center;">${statusText}</td>
                        </tr>`);
                    });
                }
            }
            handleShiftRowSelection();
        }

        $(function () {
            $('#shiftForm').submit(function (e) {
                e.preventDefault();
                var formData = new FormData($(this)[0]);

                $.ajax({
                    headers: {
                        "X-CSRFToken": '{{csrf_token}}'
                    },
                    url: "{% url 'shifts_save_and_update' %}",
                    data: formData,
                    cache: false,
                    contentType: false,
                    processData: false,
                    method: 'POST',
                    type: 'POST',
                    dataType: 'json',
                    success: function (resp) {
                        if (success = resp.msg) {
                            toastr.success(resp.msg);
                            loadshiftlist();
                            showTypeLoader();
                            resetShiftForm();
                            // Hide loader
                            setTimeout(function () {
                                hideTypeLoader();
                            }, 1100);

                        } else {
                            toastr.error(resp.errmsg);
                        }
                    }
                });
            });
        });
    });

    function handleShiftRowSelection() {
        // Check if there is a selected item ID in local storage and highlight the row
        var selectedShiftID = localStorage.getItem("selectedShiftID");
        if (selectedShiftID) {
            $(".shift_editBtn").removeClass("selected-row");
            $(".shift_editBtn[data-shift-id='" + selectedShiftID + "']").addClass("selected-row");
        }

        // Add an event listener to the item rows
        $(document).on("click", ".shift_editBtn", function () {
            var clickedshiftID = $(this).data("shift-id");
            $(".shift_editBtn").removeClass("selected-row");
            $(this).addClass("selected-row");

            // Save the selected item ID to local storage
            localStorage.setItem("selectedShiftID", clickedshiftID);
        });
    }

    //==========================================
    //loader 
    const loader_shift = document.querySelector(".loader_shift");
    const loaderbodyshift = document.querySelector(".loader-body_shift");

    // Function to show the loader
    function showTypeLoader() {
        loader_shift.style.display = "block";
        loaderbodyshift.style.display = "block";
        loader_shift.style.left = "50%"; // Set left position to center
        loader_shift.style.top = "50%"; // Set top position to center
    }

    // Function to hide the loader
    function hideTypeLoader() {
        loader_shift.style.display = "none";
        loaderbodyshift.style.display = "none";
    }

    // Function to check and show loader based on local storage
    function checkAndShiftShowLoader() {
        const loaderVisible = localStorage.getItem("loaderVisible");
        if (loaderVisible === "true") {
            showTypeLoader();
        }
    }

    // Event listener for radio button change
    document.querySelectorAll('input[name="shiftoption"]').forEach(radio => {
        radio.addEventListener('change', function () {
            showTypeLoader(); // Show loader when radio button changes
            // Add logic to handle the radio button change if needed
            setTimeout(() => {
                hideTypeLoader(); // Hide loader after a delay (you can adjust this)
            }, 1100); // Example: hide loader after 2 seconds
        });
    });

    // Check and show loader on page load
    checkAndShiftShowLoader();

    window.addEventListener("load", () => {
        // Adjust the delay in milliseconds (e.g., 2000 for 2 seconds)
        setTimeout(() => {
            hideTypeLoader();
        }, 1100);
    });
    //loader
    //==========================================

    function resetShiftForm() {
        $('#shiftForm')[0].reset();
        $('#id_shift_id').val('');
    }
</script>
