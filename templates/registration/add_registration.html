{% load static %}
<div class="col-sm-12">
    <div class="card main-card">
        <div class="card-body card-body_item_setup">
            <div class="itemsetup_container">
                <form id="cust_form" enctype="multipart/form-data">
                    <input type="hidden" id="id_reg_id" name="reg_id" value="">
                    <div class="add_edit_head">
                        <h2 class="text-primary">Add New Students Info</h2>
                    </div>
                    <div class="modal_closer">
                        <button type="button" class="btn bg-danger text-white closerBtn"
                            data-bs-dismiss="modal">X</button>
                    </div>
                    <!--  -->
                    <div class="row">
                        <div class="col-sm-7">
                            <div class="card add_user_card">
                                <div class="card-body">
                                    <div class="user_add_body">
                                        <div class="sub_body_one">
                                            <div class="row add_user_row">
                                                <!--  -->
                                                <div class="mb-3 col-sm-12" style="display: flex; flex-direction: row; flex-wrap: nowrap; justify-content: space-between; align-items: center;">
                                                    <div class="col-sm-6O">
                                                        <label for="id_org_id" class="form-label label-margin required">
                                                            Org Name
                                                        </label>
                                                        <select class="form-select regSelect-field" id="id_org_id" name="org_id" required>
                                                            <!-- <option value="" selected disabled>Choose here</option> -->
                                                            {% for org in user_org_list %}
                                                            <option id="{{org.org_id}}" value="{{org.org_id}}">
                                                                {{org.org_name}}
                                                            </option>
                                                            {% endfor %}
                                                        </select>
                                                    </div>
                                                    <!--  -->
                                                    <div class="col-sm-6B">
                                                        <label for="id_branch_id" class="form-label label-margin required">
                                                            Branch Name
                                                        </label>
                                                        <select class="form-select regSelect-field" id="id_branch_id" name="branch_id" required>
                                                            <!--  -->
                                                            {% for branch in user_branch_list %}
                                                            <option id="{{ branch.branch_id }}" value="{{ branch.branch_id }}">
                                                                {{ branch.branch_name }}
                                                            </option>
                                                            {% endfor %}
                                                        </select>
                                                    </div>
                                                </div>
                                                <!--  -->
                                                <div class="mb-3 col-sm-12" style="display: flex; flex-direction: row; flex-wrap: nowrap; justify-content: space-between; align-items: center;">
                                                    <div class="col-sm-6N">
                                                        <label for="full_name" class="form-label label-margin required">
                                                            Students Name
                                                        </label>
                                                        <input type="text" class="form-control regInput-field"
                                                            id="full_name" name="full_name" autocomplete="off" required>
                                                    </div>
                                                    <!--  -->
                                                    <div class="col-sm-6R">
                                                        <label for="students_roll_no" class="form-label label-margin required">
                                                            Students Roll
                                                        </label>
                                                        <input type="text" class="form-control regInput-field"
                                                            id="students_roll_no" name="students_roll_no" autocomplete="off" required>
                                                    </div>
                                                </div>
                                                <!--  -->
                                                <!--  -->
                                                <!--  -->
                                                <!--  -->
                                                <div class="mb-3 col-sm-12" style="display: flex; flex-direction: row; flex-wrap: nowrap; justify-content: space-between; align-items: center;">
                                                    <div class="col-sm-6O">
                                                        <label for="id_is_add_class" class="form-label label-margin required">
                                                            Class
                                                        </label>
                                                        <select class="form-select regSelect-field" id="id_is_add_class" name="is_class" required>
                                                            <option value="" selected disabled>Choose here</option>
                                                            {% for cls in user_others_access.class_access %}
                                                            <option id="{{cls.class_id}}" value="{{cls.class_id}}" data-allow_group="{{ cls.allow_groups }}" {% if cls.is_defaults %}selected{% endif %}>
                                                                {{cls.class_name}}
                                                            </option>
                                                            {% endfor %}
                                                        </select>
                                                    </div>
                                                    <!--  -->
                                                    <div class="col-sm-6B">
                                                        <label for="id_is_section" class="form-label label-margin required">
                                                            Section
                                                        </label>
                                                        <select class="form-select regSelect-field" id="id_is_section" name="is_section" required>
                                                            <option value="" selected disabled>Choose here</option>
                                                            {% for section in user_others_access.section_access %}
                                                            <option id="{{section.section_id}}" value="{{section.section_id}}" {% if sect.is_defaults %}selected{% endif %}>
                                                                {{section.section_name}}
                                                            </option>
                                                            {% endfor %}
                                                        </select>
                                                    </div>
                                                </div>
                                                <!--  -->
                                                <!--  -->
                                                <div class="mb-3 col-sm-12" style="display: flex; flex-direction: row; flex-wrap: nowrap; justify-content: space-between; align-items: center;">
                                                    <div class="col-sm-6O">
                                                        <label for="id_is_shift" class="form-label label-margin required">
                                                            Shift
                                                        </label>
                                                        <select class="form-select regSelect-field" id="id_is_shift" name="is_shift" required>
                                                            <option value="" selected disabled>Choose here</option>
                                                            {% for shift in user_others_access.shift_access %}
                                                            <option id="{{shift.shift_id}}" value="{{shift.shift_id}}" {% if shift.is_defaults %}selected{% endif %}>
                                                                {{shift.shift_name}}
                                                            </option>
                                                            {% endfor %}
                                                        </select>
                                                    </div>
                                                    <!--  -->
                                                    <div class="col-sm-6B" id="add_groups_block" style="display: none;">
                                                        <label for="id_is_add_groups" class="form-label label-margin required">
                                                            Groups
                                                        </label>
                                                        <select class="form-select regSelect-field" id="id_is_add_groups" name="is_groups" required>
                                                            <option value="" selected disabled>Choose here</option>
                                                            {% for groups in user_others_access.group_access %}
                                                            <option id="{{groups.groups_id}}" value="{{groups.groups_id}}" {% if groups.is_defaults %}selected{% endif %}>
                                                                {{groups.groups_name}}
                                                            </option>
                                                            {% endfor %}
                                                        </select>
                                                    </div>
                                                </div>
                                                <!--  -->
                                                <!--  -->
                                                <div class="col-sm-6">
                                                    <label class="form-label label-margin required">
                                                        Is Version
                                                    </label>
                                                    <div class="mb-3 inline-RadioBody">
                                                        <div class="form-check form-check-inline">
                                                            <input class="form-check-input" type="radio"
                                                                name="is_english" id="id_is_english" value="1"
                                                                checked>
                                                            <label class="form-check-label" for="id_is_english">
                                                                Is English
                                                            </label>
                                                        </div>
                                                        <div class="form-check form-check-inline">
                                                            <input class="form-check-input" type="radio"
                                                                name="is_bangla" id="id_is_bangla"
                                                                value="0">
                                                            <label class="form-check-label" for="id_is_bangla">
                                                                Is Bangla
                                                            </label>
                                                        </div>
                                                    </div>
                                                </div>
                                                <div class="col-sm-6">
                                                    <label class="form-label label-margin" for="id_is_optional_sub">
                                                        Optional Subjects
                                                    </label>
                                                    <select class="form-select regSelect-field" id="id_is_optional_sub" name="is_optional_sub">
                                                        <!--  -->

                                                    </select>
                                                </div>
                                                <!--  -->
                                                <!--  -->
                                                <!--  -->
                                                <!--  -->
                                                <div class="col-sm-6">
                                                    <label class="form-label label-margin required">
                                                        Gender
                                                    </label>
                                                    <div class="mb-3 inline-RadioBody">
                                                        <div class="form-check form-check-inline">
                                                            <input class="form-check-input" type="radio"
                                                                name="gender" id="maleRadio" value="Male"
                                                                checked required>
                                                            <label class="form-check-label" for="maleRadio">
                                                                Male
                                                            </label>
                                                        </div>
                                                        <div class="form-check form-check-inline">
                                                            <input class="form-check-input" type="radio"
                                                                name="gender" id="femaleRadio"
                                                                value="Female" required>
                                                            <label class="form-check-label" for="femaleRadio">
                                                                Female
                                                            </label>
                                                        </div>
                                                        <div class="form-check form-check-inline">
                                                            <input class="form-check-input" type="radio"
                                                                name="gender" id="othersRadio"
                                                                value="Others" required>
                                                            <label class="form-check-label" for="othersRadio">
                                                                Others
                                                            </label>
                                                        </div>
                                                    </div>
                                                </div>
                                                <!-- Marital Status -->
                                                <div class="col-sm-6">
                                                    <div class="mb-3">
                                                        <label for="marital_status"
                                                            class="form-label label-margin">
                                                            Marital Status
                                                        </label>
                                                        <select class="form-select regSelect-field" id="marital_status" name="marital_status">
                                                            <option selected disabled>Choose Marital Status</option>
                                                            <option value="Single">Single</option>
                                                            <option value="Maried">Maried</option>
                                                            <option value="Unmaried">Unmaried</option>
                                                            <option value="Others">Others</option>
                                                        </select>
                                                    </div>
                                                </div>
                                                <!--  -->
                                                <div class="col-sm-6">
                                                    <div class="mb-3">
                                                        <label for="mobile_number"
                                                            class="form-label label-margin">
                                                            Mobile Number
                                                        </label>
                                                        <input type="number" class="form-control regInput-field"
                                                            id="mobile_number" name="mobile_number" autocomplete="off">
                                                    </div>
                                                </div>
                                                <!-- Date of Birth/Age -->
                                                <div class="col-sm-6">
                                                    <div class="mb-3">
                                                        <label for="dateofbirthage"
                                                            class="form-label label-margin">
                                                            Date of Birth/Age
                                                        </label>
                                                        <div class="dateofbirth-age">
                                                            <div class="col-sm-6">
                                                                <input type="text" class="form-control datepicker" id="dateofbirthage" name="dateofbirth" style="font-size: 0.76rem; border-color: #92baeb;" autocomplete="off">
                                                            </div>
                                                            <div class="col-sm-1"
                                                                style="display: flex; justify-content: center; text-align: center; align-items: center;">
                                                                /
                                                            </div>
                                                            <div class="col-sm-5">
                                                                <input type="text" class="form-control regInput-field"
                                                                    id="age" placeholder="Age" disabled>
                                                            </div>
                                                        </div>
                                                    </div>
                                                </div>
                                                <!-- Blood Group -->
                                                <div class="col-sm-6">
                                                    <div class="mb-3">
                                                        <label for="blood_group"
                                                            class="form-label label-margin">
                                                            Blood Group
                                                        </label>
                                                        <select class="form-select regSelect-field" id="blood_group" name="blood_group">
                                                            <option selected disabled>Choose Blood Group</option>
                                                            <option value="O+">O+</option>
                                                            <option value="O-">O-</option>
                                                            <option value="A+">A+</option>
                                                            <option value="A-">A-</option>
                                                            <option value="B+">B+</option>
                                                            <option value="B-">B-</option>
                                                            <option value="AB+">AB+</option>
                                                            <option value="AB-">AB-</option>
                                                        </select>
                                                    </div>
                                                </div>
                                                <!-- Patient Type -->
                                                <div class="col-sm-6">
                                                    <div class="mb-3">
                                                        <label for="patient_type"
                                                            class="form-label label-margin">
                                                            Students Type
                                                        </label>
                                                        <select class="form-select regSelect-field" id="patient_type" name="patient_type">
                                                            <option selected disabled>Choose Students Type</option>
                                                            <option value="General Students">General Students</option>
                                                            <option value="Corporate Students">Corporate Students</option>
                                                            <option value="VIP Students">VIP Students</option>
                                                        </select>
                                                    </div>
                                                </div>
                                                <!--  -->
                                                <div class="col-sm-6">
                                                    <div class="mb-3">
                                                        <label for="father_name"
                                                            class="form-label label-margin">
                                                            Father Name
                                                        </label>
                                                        <input type="text"
                                                            class="form-control regInput-field"
                                                            id="father_name" name="father_name" autocomplete="off">
                                                    </div>
                                                </div>
                                                <!--  -->
                                                <div class="col-sm-6">
                                                    <div class="mb-3">
                                                        <label for="mother_name"
                                                            class="form-label label-margin">
                                                            Mother Name
                                                        </label>
                                                        <input type="text"
                                                            class="form-control regInput-field"
                                                            id="mother_name" name="mother_name" autocomplete="off">
                                                    </div>
                                                </div>
                                                <!--  -->
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <!--  -->
                        <div class="col-sm-5">
                            <div class="card add_user_card_other" style="border-left: 1px solid rgba(0, 0, 0, .125);">
                                <div class="card-body">
                                    <!-- image -->
                                    <div class="profile-container px-4">
                                        <div class="row gx-5 user-profile">
                                            <div class="col user-profile-img">
                                                <div class="user-img">
                                                    <div class="profile-pic">
                                                        <div id="display_image">
                                                            <img class="img-viewer" id="selected_image"
                                                                src="{% static 'images/profile_img/user.png' %}">
                                                        </div>
                                                    </div>
                                                    <div class="form-row field-profile_img profile-icon">
                                                        <div>
                                                            <label for="id_customer_img">
                                                                <i class="bx bxs-camera profile-upload-icon"></i>
                                                            </label>
                                                            <input type="file" name="customer_img" accept="image/*"
                                                                id="id_customer_img" style="display:none;"
                                                                onchange="displaySelectedImage(this);">
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                    <!-- image end -->
                                </div>
                            </div>
                        </div>
                    </div>
                    <!--  -->
                    <div class="col-sm-12 reg-accordionRow">
                        <!-- C/O Information -->
                        <div class="col-sm-6">
                            <div class="accordion reg-accordionFirst" id="accordionPanelsStayOpenExample">
                                <div class="accordion-item">
                                    <h2 class="accordion-header">
                                        <button class="accordion-button" type="button" data-bs-toggle="collapse"
                                            data-bs-target="#CO-Information" aria-expanded="false"
                                            aria-controls="CO-Information">
                                            C/O Information
                                        </button>
                                    </h2>
                                    <div id="CO-Information" class="accordion-collapse collapse">
                                        <div class="accordion-body">
                                            <div class="card otherInfo_card">
                                                <div class="card-body">
                                                    <div class="user_add_body">
                                                        <div class="sub_body_one">
                                                            <div class="row add_user_row">
                                                                <!--  -->
                                                                <div class="mb-3">
                                                                    <label for="co_name"
                                                                        class="form-label label-margin">
                                                                        C/O Name
                                                                    </label>
                                                                    <input type="text" id="co_name" name="co_name"
                                                                        class="form-control regInput-field" autocomplete="off">
                                                                </div>
                                                                <!--  -->
                                                                <div class="col-sm-6">
                                                                    <div class="mb-3">
                                                                        <label for="co_relationship"
                                                                            class="form-label label-margin">
                                                                            Relationship
                                                                        </label>
                                                                        <input type="text" class="form-control regInput-field" id="co_relationship" name="co_relationship" autocomplete="off">
                                                                    </div>
                                                                </div>
                                                                <!--  -->
                                                                <div class="col-sm-6">
                                                                    <div class="mb-3">
                                                                        <label for="co_mobile_number"
                                                                            class="form-label label-margin">
                                                                            Mobile Number
                                                                        </label>
                                                                        <input type="number"
                                                                            class="form-control regInput-field"
                                                                            id="co_mobile_number" name="co_mobile_number" autocomplete="off">
                                                                    </div>
                                                                </div>
                                                            </div>
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>

                        </div>
                        <!-- Contact Information -->
                        <div class="col-sm-6">
                            <div class="accordion reg-accordionSecond" id="accordionPanelsStayOpenExample">
                                <div class="accordion-item">
                                    <h2 class="accordion-header">
                                        <button class="accordion-button" type="button" data-bs-toggle="collapse"
                                            data-bs-target="#Contact-Information" aria-expanded="false"
                                            aria-controls="Contact-Information">
                                            Contact Information
                                        </button>
                                    </h2>
                                    <div id="Contact-Information" class="accordion-collapse collapse">
                                        <div class="accordion-body">
                                            <div class="card otherInfo_card">
                                                <div class="card-body">
                                                    <div class="user_add_body">
                                                        <div class="sub_body_one">
                                                            <div class="row add_user_row">
                                                                <!--  -->
                                                                <!--  -->
                                                                <div class="col-sm-6">
                                                                    <div class="mb-3">
                                                                        <label for="division"
                                                                            class="form-label label-margin">
                                                                            Division
                                                                        </label>
                                                                        <select class="form-select regSelect-field" id="division" name="division">
                                                                            <option selected disabled>Choose Division</option>
                                                                            {% for divis in divisions %}
                                                                            <option value="{{divis.lookup_id}}">
                                                                                {{ divis.name }}
                                                                            </option>
                                                                            {% endfor %}
                                                                        </select>
                                                                    </div>
                                                                </div>
                                                                <!--  -->
                                                                <div class="col-sm-6">
                                                                    <div class="mb-3">
                                                                        <label for="district"
                                                                            class="form-label label-margin">
                                                                            District
                                                                        </label>
                                                                        <select class="form-select regSelect-field" id="district" name="district">
                                                                            <option selected disabled>Choose District</option>
                                                                            {% for dist in districts %}
                                                                            <option value="{{dist.lookup_id}}">
                                                                                {{ dist.name }}
                                                                            </option>
                                                                            {% endfor %}
                                                                        </select>
                                                                    </div>
                                                                </div>
                                                                <!--  -->
                                                                <!--  -->
                                                                <div class="col-sm-6">
                                                                    <div class="mb-3">
                                                                        <label for="thana_upazila"
                                                                            class="form-label label-margin">
                                                                            Thana/Upazila
                                                                        </label>
                                                                        <select class="form-select regSelect-field" id="thana_upazila" name="thana_upazila">
                                                                            <option selected disabled>Choose Thana/Upazila</option>
                                                                            {% for upazila in upazilas %}
                                                                            <option value="{{upazila.lookup_id}}">
                                                                                {{ upazila.name }}
                                                                            </option>
                                                                            {% endfor %}
                                                                        </select>
                                                                    </div>
                                                                </div>
                                                                <!--  -->
                                                                <div class="col-sm-6">
                                                                    <div class="mb-3">
                                                                        <label for="address"
                                                                            class="form-label label-margin">
                                                                            Address
                                                                        </label>
                                                                        <textarea type="text"
                                                                            class="form-control regInput-field"
                                                                            style="height: 30.5px;"
                                                                            id="address" name="address" autocomplete="off"></textarea>
                                                                    </div>
                                                                </div>
                                                            </div>
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                    </div>
                    <div class="col-sm-12 reg-accordionRowSecond">
                        <!-- Others Information -->
                        <div class="col-sm-6">
                            <div class="accordion reg-accordionFirst" id="accordionPanelsStayOpenExample">
                                <div class="accordion-item">
                                    <h2 class="accordion-header">
                                        <button class="accordion-button" type="button" data-bs-toggle="collapse"
                                            data-bs-target="#Others-Information" aria-expanded="false"
                                            aria-controls="Others-Information">
                                            Others Information
                                        </button>
                                    </h2>
                                    <div id="Others-Information" class="accordion-collapse collapse">
                                        <div class="accordion-body">
                                            <div class="card otherInfo_card">
                                                <div class="card-body">
                                                    <div class="user_add_body">
                                                        <div class="sub_body_one">
                                                            <div class="row add_user_row">
                                                                <!--  -->
                                                                <div class="col-sm-6">
                                                                    <div class="mb-3">
                                                                        <label for="occupation"
                                                                            class="form-label label-margin">
                                                                            Occupation
                                                                        </label>
                                                                        <input type="text"

                                                                </div>
                                                                <!--  -->
                                                                <div class="col-sm-6">
                                                                    <div class="mb-3">
                                                                        <label for="religion"
                                                                            class="form-label label-margin">
                                                                            Religion
                                                                        </label>
                                                                        <select class="form-select regSelect-field"

                                                                        </select>

                                                                </div>

                                                                            Nationality
                                                                        </label>
                                                                        <input type="text"
                                                                            class="form-control regInput-field"
                                                                            id="nationality" name="nationality" autocomplete="off">
                                                                    </div>
                                                                </div>
                                                                <!--  -->
                                                                <div class="col-sm-6">
                                                                    <div class="mb-3">
                                                                        <label for="email"
                                                                            class="form-label label-margin">
                                                                            Email
                                                                        </label>

                                                                    </div>
                                                                </div>
                                                                <!--  -->
                                                                <div class="col-sm-6">
                                                                    <div class="mb-3">
                                                                        <label for="identity_mark"
                                                                            class="form-label label-margin">
                                                                            Identity Mark
                                                                        </label>
                                                                        <input type="text"
                                                                            class="form-control regInput-field"
                                                                            id="identity_mark" name="identity_mark" autocomplete="off">
                                                                    </div>
                                                                </div>
                                                                <!--  -->
                                                            </div>
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>

                        </div>
                        <!-- Emergency Contact -->
                        <div class="col-sm-6">
                            <div class="accordion reg-accordionSecond" id="accordionPanelsStayOpenExample">
                                <div class="accordion-item">
                                    <h2 class="accordion-header">
                                        <button class="accordion-button" type="button" data-bs-toggle="collapse"
                                            data-bs-target="#Emergency-Contact" aria-expanded="false"
                                            aria-controls="Emergency-Contact">
                                            Emergency Contact
                                        </button>
                                    </h2>
                                    <div id="Emergency-Contact" class="accordion-collapse collapse">
                                        <div class="accordion-body">
                                            <div class="card otherInfo_card">
                                                <div class="card-body">
                                                    <div class="user_add_body">

<script>
    $(document).ready(function () {

        $('#id_org_id, #id_is_add_class, #id_is_add_groups, #id_is_english, #id_is_bangla').change(function () {
            OrgWiseOptionalSubOptions();
        });

        OrgWiseOptionalSubOptions(); // run on page load

        function OrgWiseOptionalSubOptions(callback) {
            var selectedOrgId = $('#id_org_id').val();
            var selectedClassId = $('#id_is_add_class').val();
            var selectedgroupsId = $('#id_is_add_groups').val();

            var isEnglishId = $('#id_is_english').is(':checked') ? 1 : 0;
            var isBanglaId = $('#id_is_bangla').is(':checked') ? 1 : 0;

            $.ajax({
                url: '/get_optional_subjects_option/',
                method: 'GET',
                data: { 
                    org_id: selectedOrgId,
                    class_id: selectedClassId,
                    groups_id: selectedgroupsId,
                    is_english: isEnglishId,
                    is_bangla: isBanglaId,
                },
                success: function (data) {
                    $('#id_is_optional_sub').empty();

                    // Add default disabled option
                    $('#id_is_optional_sub').append('<option value="" selected>Choose here</option>');

                    $.each(data.subOptions, function (index, subject) {
                        $('#id_is_optional_sub').append(
                            '<option value="' + subject.subjects_id + '" data-subjects_name="' + subject.subjects_name + '">' + subject.subjects_name +  '</option>'
                        );
                    });

                    if (typeof callback === "function") {
                        callback();
                    }
                },
                error: function (error) {
                    console.error('Error fetching subject options:', error);
                }
            });
        }
    });


    /////////////// is version bangla 7 english radio exchange togather
    const englishRadio = document.getElementById('id_is_english');
    const banglaRadio = document.getElementById('id_is_bangla');

    englishRadio.addEventListener('click', function () {
        if (englishRadio.checked) {
            banglaRadio.checked = false;
            englishRadio.value = 1;
            banglaRadio.value = 0;
        }
    });

    banglaRadio.addEventListener('click', function () {
        if (banglaRadio.checked) {
            englishRadio.checked = false;
            banglaRadio.value = 1;
            englishRadio.value = 0;
        }
    });

    // Optional: initialize based on checked status
    window.addEventListener('DOMContentLoaded', function () {
        if (englishRadio.checked) {
            englishRadio.value = 1;
            banglaRadio.checked = false;
            banglaRadio.value = 0;
        } else if (banglaRadio.checked) {
            banglaRadio.value = 1;
            englishRadio.checked = false;
            englishRadio.value = 0;
        }
    });
    /////////////// is version bangla 7 english radio exchange togather end

    // Define globally so it's accessible in both blocks
    function toggleAddGroupsBlock() {
        const $selected = $('#id_is_add_class option:selected');
        const allowGroup = $selected.data('allow_group');
    
        if (allowGroup == 1 || String(allowGroup).toLowerCase() === "true") {
            $('#add_groups_block').show();
            $('#id_is_add_groups').prop('required', true);
        } else {
            $('#add_groups_block').hide();
            $('#id_is_add_groups').prop('required', false).val('');
        }
    }
    
    $(document).ready(function () {
        $('#id_is_add_class').on('change', toggleAddGroupsBlock);
        toggleAddGroupsBlock(); // Run initially
    });
    /////////////////////////////////////////////////////////////////
    $(function () {
        $('#cust_form').submit(function (e) {
            e.preventDefault();
            var formData = new FormData($(this)[0]);

            $.ajax({
                headers: {
                    "X-CSRFToken": '{{csrf_token}}'
                },
                url: "{% url 'save_update_customer_registrations' %}",
                data: formData,
                cache: false,
                contentType: false,
                processData: false,
                method: 'POST',
                type: 'POST',
                dataType: 'json',
                success: function (resp) {
                    if (success = resp.msg) {
                        toastr.success(resp.msg);
                        location.reload();
                    } else {
                        toastr.error(resp.errmsg);
                    }
                }
            });
        });
    });


    // Date picker
    $(document).ready(function () {
        $(".datepicker").datepicker({
            dateFormat: 'yy-mm-dd',
            changeYear: true,
            changeMonth: true,
            yearRange: "1900:2100", // Optional: Limit the year range for the date picker
            onSelect: onDateOfBirthChange // Trigger age calculation on date selection
        });
    });

    // Function to handle the date of birth change event
    function onDateOfBirthChange() {
        const dobInputElement = document.querySelector('#dateofbirthage');
        const ageInputElement = document.querySelector('#age');

        if (dobInputElement && ageInputElement) {
            const selectedDate = new Date(dobInputElement.value);
            const currentDate = new Date();

            if (isNaN(selectedDate.getTime())) {
                ageInputElement.value = ''; // Clear age if the date is invalid
                return;
            }

            let ageYears = currentDate.getFullYear() - selectedDate.getFullYear();
            let ageMonths = currentDate.getMonth() - selectedDate.getMonth();
            let ageDays = currentDate.getDate() - selectedDate.getDate();

            // Adjust for negative days
            if (ageDays < 0) {
                const lastDayOfPrevMonth = new Date(currentDate.getFullYear(), currentDate.getMonth(), 0).getDate();
                ageDays += lastDayOfPrevMonth;
                ageMonths--;
            }

            // Adjust for negative months
            if (ageMonths < 0) {
                ageYears--;
                ageMonths += 12;
            }

            ageInputElement.value = `${ageYears} Y, ${ageMonths} M, ${ageDays} D`;
        }
    }

    // Add event listener for manual date input
    document.getElementById('dateofbirthage').addEventListener('input', onDateOfBirthChange);
</script>
