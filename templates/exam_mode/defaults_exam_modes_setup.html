{% extends 'base_form/main_base/main_base.html' %}
{% load crispy_forms_tags %}
{% load static %}

{% block extra_link %}
<!--========== CSS ==========-->
<link rel="stylesheet" href="{% static 'base_setup/css/base_setup.css' %}">
<style>
    .table>tbody {
        vertical-align: middle;
    }
</style>
<!--========== from type_category js file ==========-->
<script src="{% static 'base_setup/js/base_setup.js' %}"></script>
{% endblock %}
<!--========== CONTENTS start==========-->
{% block body %}
<main>
<section  class="container-fluid" style="margin-top: 0.5rem; margin-bottom:0.5rem;">
    <section style="border: 1px solid rgba(0, 0, 0, .125); border-top: none; border-radius: 0.3rem;">
        <div style="border: 1px solid rgba(0, 0, 0, .125);
            margin-bottom: 0.5rem;
            border-left: none;
            border-right: none;
            border-top-left-radius: 0.3rem;
            border-top-right-radius: 0.3rem;
            background: #455697;">
            <!-- Main Heading -->
            <div class="row" style="display: flex; justify-content: center; text-align: center; align-items: center;">
                <div class="col col-md-4 col-md-6 dashboar-head">
                    <div class="d-sm-flex align-items-center mb-2" style="margin-left: 0.5rem;">
                        <i class='bx bx-book-alt text-white req-head-icon'></i>
                        <h1 class="h3 text-white req-head">Defaults Exam Modes Setup</h1>
                    </div>
                </div>
            </div>
        </div>
        <!--  -->
        <section>
            <div class="row row_item_setup">
                <!-- form 1 -->
                <div class="col-sm-12">
                    <div class="card main-card">
                        <div class="card-body card-body_item_setup">
                            <div class="itemsetup_container">
                                <form action="" method="" id="EXMODESFORM">
                                    <input type="hidden" id="id_exam_mode_id" name="exam_mode_id">
                                    <input type="hidden" id="id_class_update" name="class_update">
                                    <input type="hidden" id="id_subjects_update" name="subjects_update">
                                    <input type="hidden" id="id_exam_type_update" name="exam_type_update">
                                    <div class="add_edit_head" style="justify-content: left;">
                                        <h2 class="text-primary" style="margin-left: 3rem;">Add/Update Exam Modes Info</h2>
                                    </div>
                                    <!--  -->
                                    <div class="row row_item_setup">
                                        <div class="col-sm-12">
                                            <div class="card main-card">
                                                <div class="card-body card-body_item_setup" style="display: flex; flex-direction: row; flex-wrap: wrap; justify-content: flex-end; align-items: center; align-content: center;">
                                                    <div class="item_setupflag" style="display: flex; margin-right: 1rem; justify-content: right;">
                                                        <label class="form-check-label setupflag_label"
                                                            for="id_is_english">
                                                            Is English:
                                                        </label>
                                                        <input class="form-check-input" type="radio" id="id_is_english"
                                                            name="is_version" value="english" aria-label="..." checked>
                                                    </div>
                                                    <!--  -->
                                                    <div class="item_setupflag" style="display: flex; margin-right: 1rem; justify-content: right;">
                                                        <label class="form-check-label setupflag_label"
                                                            for="id_is_bangla">
                                                            Is Bangla:
                                                        </label>
                                                        <input class="form-check-input" type="radio" id="id_is_bangla"
                                                            name="is_version" value="bangla" aria-label="...">
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                        <!--  -->
                                        <div class="col-sm-12">
                                            <div class="card main-card">
                                                <div class="card-body card-body_item_setup">
                                                    <!--  -->
                                                    <div class="row row_item_setup">
                                                        <div class="col-sm-6">
                                                            <div class="card main-card">
                                                                <div class="card-body item_setup_sub">
                                                                    <div class="row cash_point_row"
                                                                        style="margin-top: -2px;">
                                                                        <label for="id_org" class="col-sm-orgName col-form-label font_size_filter required" style="width: 16%;">
                                                                            Org Name:
                                                                        </label>
                                                                        <div class="col-orgInput" style="width: 71.5%;">
                                                                            <select id="id_org" name="org" class="form-select item_inputbox" aria-label="Default select example" required>
                                                                                <!-- <option value="" selected disabled>Choose Organization ...</option> -->
                                                                                {% for org in user_org_list %}
                                                                                <option value="{{org.org_id}}">
                                                                                    {{ org.org_name }}
                                                                                </option>
                                                                                {% endfor %}
                                                                            </select>
                                                                        </div>
                                                                    </div>
                                                                </div>
                                                            </div>
                                                        </div>
                                                        <!--  -->
                                                        <div class="col-sm-6">
                                                            <div class="card main-card">
                                                                <div class="card-body item_setup_sub">
                                                                    <div class="row cash_point_row" style="margin-top: -2px;">
                                                                        <label for="id_is_class" class="col-sm-orgName col-form-label font_size_filter required" style="width: 28.5%;">
                                                                            Class:
                                                                        </label>
                                                                        <div class="col-orgInput" style="width: 71.5%;">
                                                                            <select id="id_is_class" name="is_class_id" class="form-select item_inputbox"
                                                                                aria-label="Default select example" required>
                                                                                <!-- <option value="" selected disabled>Choose Class Name ...</option> -->
                                                                                {% for clss in user_others_access.class_access %}
                                                                                <option value="{{clss.class_id}}" data-allow_group="{{ clss.allow_groups }}" {% if clss.is_defaults %}selected{% endif %}>
                                                                                    {{ clss.class_name }}
                                                                                </option>
                                                                                {% endfor %}
                                                                            </select>
                                                                        </div>
                                                                    </div>
                                                                </div>
                                                            </div>
                                                        </div>
                                                    </div>
                                                    <!--  -->
                                                    <div class="row row_item_setup">
                                                        <div class="col-sm-6">
                                                            <div class="card main-card">
                                                                <div class="card-body item_setup_sub">
                                                                    <div class="row cash_point_row" style="margin-top: -2px;">
                                                                        <label for="id_is_subjects" class="col-sm-orgName col-form-label font_size_filter required" style="width: 16%;">
                                                                            Subjects:
                                                                        </label>
                                                                        <div class="col-orgInput" style="width: 71.5%;">
                                                                            <select id="id_is_subjects" name="is_subjects" class="form-select item_inputbox" aria-label="Default select example" required>
                                                                                <!--  -->
                                                                            </select>
                                                                        </div>
                                                                    </div>
                                                                </div>
                                                            </div>
                                                        </div>
                                                        <!--  -->
                                                        <div class="col-sm-6">
                                                            <div class="card main-card">
                                                                <div class="card-body item_setup_sub">
                                                                    <div class="row cash_point_row"
                                                                        style="margin-top: -2px;">
                                                                        <label for="id_is_exam_type" class="col-sm-orgName col-form-label font_size_filter required" style="width: 28.5%;">
                                                                            Exam Type:
                                                                        </label>
                                                                        <div class="col-orgInput" style="width: 71.5%;">
                                                                            <select id="id_is_exam_type" name="is_exam_type" class="form-select item_inputbox" aria-label="Default select example" required>
                                                                                <!-- <option value="" selected disabled>Choose Exam Type ...</option> -->
                                                                                {% for examtype in examtypelist %}
                                                                                    <option value="{{ examtype.exam_type_id }}" data-type_name="{{ examtype.exam_type_name }}">
                                                                                        {{ examtype.exam_type_name }}
                                                                                    </option>
                                                                                {% endfor %}
                                                                            </select>
                                                                        </div>
                                                                    </div>
                                                                </div>
                                                            </div>
                                                        </div>
                                                    </div>
                                                    <!--  -->
                                                    <!--  -->
                                                    <div class="row row_item_setup">
                                                        <div class="col-sm-12">
                                                            <div class="exam_modestb" style="margin-top: 0.5rem;">
                                                                <table id="" class="table table-striped table-hover" style="width: 100%;">
                                                                    <thead class="text-center table-header_itemlist">
                                                                        <tr>
                                                                            <th style="text-align:center; width: 5%;">Sl</th>
                                                                            <th style="text-align:center; width: 60%;">Exam Modes Name</th>
                                                                            <th style="text-align:center; width: 15%;">Defaults Marks</th>
                                                                            <th style="text-align:center; width: 15%;">Pass Marks</th>
                                                                            <th style="text-align:center; width: 10%;">Is Active</th>
                                                                        </tr>
                                                                    </thead>
                                                                    <!--  -->
                                                                    <tbody id="MODESTB" class="table-body-row" style="text-align:center; cursor: pointer;">
                                                                        <tr>
                                                                            <td style="text-align:left;" colspan="2"><input type="text" value="Defaults/Pass Marks" style="outline: none; border: 0; background: none; margin-left: 2rem;" readonly></td>
                                                                            <td style="text-align:center;"><input type="number" class="form-control item_inputbox" id="id_defaults_marks" value="0" style="width: 96%; text-align: center; border: none !important; background: transparent; color: red; font-weight: bolder;" readonly></td>
                                                                            <td style="text-align:center;"><input type="number" class="form-control item_inputbox" id="id_pass_marks" value="0" style="width: 96%; text-align: center; border: none !important; background: transparent; color: red; font-weight: bolder;" readonly></td>
                                                                            <td style="text-align:center;"></td>
                                                                        </tr>
                                                                        <!--  -->
                                                                        <!-- Dynamic Rows will be inserted here by Ajax -->
                                                                        <!--  -->
                                                                        <tr>
                                                                            <td style="text-align: right;" colspan="2">Total:</td>
                                                                            <td style="text-align: center;"><strong name="grands_defaults_marks" id="grand_default_marks" style="margin-left: 0.9rem;"></strong> </td>
                                                                            <td style="text-align: center;"><strong name="grands_pass_marks" id="grand_pass_marks" style="margin-left: 0.9rem;"></strong> </td>
                                                                            <td></td>
                                                                        </tr>
                                                                    </tbody>
                                                                </table>
                                                            </div>
                                                        </div>    
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>

                                    <!-- submit button -->
                                    <div class="submit_button" style="margin-top: 5rem;">
                                        <button type="button" class="btn btn-primary btn-sm" style="margin-right: 10px;" onclick="location.href='/defaults_exam_modes_setup/';">
                                            New
                                        </button>
                                        <!--  -->
                                        <button type="submit" value="submit" class="btn btn-success btn-sm"
                                            style="margin-right: 10px;">
                                            Save & Update
                                        </button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </section>
</section>
<!--  -->
<script>

    $(document).ready(function() {
        recalcMarks();
        OrgWiseSubOptions(function () {
            loadCombinedExamModes();
        });

        // When org, class, exam_type, version change → re-load subjects and then exam modes
        $("#id_org, #id_is_class, input[name='is_version']").change(function () {
            OrgWiseSubOptions(function () {
                loadCombinedExamModes();
            });
        });

        $("#id_is_exam_type").change(function () {
            loadCombinedExamModes();
        });

        // Event delegation for dynamic rows
        $(document).on('input change', '#MODESTB input[name="is_default_marks[]"], #MODESTB input[name="is_pass_marks[]"]', function () {
            recalcMarks();
        });
    });

    function recalcMarks() {
        const topDefault = parseFloat($("#id_defaults_marks").val()) || 0;
        const topPass = parseFloat($("#id_pass_marks").val()) || 0;

        let defaultSum = 0;
        $('#MODESTB input[name="is_default_marks[]"]').each(function () {
            let val = parseFloat($(this).val()) || 0;
            if (defaultSum + val > topDefault) {
                toastr.error("Total Default Marks cannot exceed " + topDefault);
                $(this).val(0);
                val = 0;
            }
            defaultSum += val;
        });

        let passSum = 0;
        $('#MODESTB input[name="is_pass_marks[]"]').each(function () {
            let val = parseFloat($(this).val()) || 0;
            if (passSum + val > topPass) {
                toastr.error("Total Pass Marks cannot exceed " + topPass);
                $(this).val(0);
                val = 0;
            }
            passSum += val;
        });

        $("#grand_default_marks").text(defaultSum);
        $("#grand_pass_marks").text(passSum);
    }

    function OrgWiseSubOptions(callback) {
        var selectedOrgId = $('#id_org').val();
        var selectedClassId = $('#id_is_class').val();
        var is_version = $('input[name="is_version"]:checked').val();

        $.ajax({
            url: '/get_subjects_options/',
            method: 'GET',
            data: { 
                org_id: selectedOrgId,
                class_id: selectedClassId,
                is_version: is_version,
            },
            success: function (data) {
                $('#id_is_subjects').empty();

                $.each(data.subOptions, function (index, subject) {
                    $('#id_is_subjects').append(
                        '<option value="' + subject.subjects_id + 
                        '" data-subjects_name="' + subject.subjects_name + 
                        '" data-defaults_marks="' + subject.is_defaults_marks + 
                        '" data-pass_marks="' + subject.is_pass_marks + '">' + 
                        subject.subjects_name + 
                        '</option>'
                    );
                });

                // Bind change handler fresh
                $('#id_is_subjects').off('change').on('change', function () {
                    var selectedOption = $(this).find(':selected');
                    var defaultsMarks = selectedOption.data('defaults_marks') || 0;
                    var passMarks = selectedOption.data('pass_marks') || 0;

                    $('#id_defaults_marks').val(defaultsMarks);
                    $('#id_pass_marks').val(passMarks);

                    // ✅ Call loadCombinedExamModes only when subject value exists
                    if ($(this).val()) {
                        loadCombinedExamModes();
                    }
                });

                // Auto-trigger subject change if first option exists
                if ($('#id_is_subjects option').length > 0) {
                    $('#id_is_subjects').trigger('change');
                }

                if (typeof callback === "function") {
                    callback();
                }
            },
            error: function (error) {
                console.error('Error fetching subject options:', error);
            }
        });
    }

    function loadCombinedExamModes() {
        var org_id = $("#id_org").val();
        var class_id = $("#id_is_class").val();
        var subject_id = $("#id_is_subjects").val();
        var exam_type_id = $("#id_is_exam_type").val();
        var is_version = $('input[name="is_version"]:checked').val();

        if (!subject_id) {
            console.warn("No subject selected → skipping loadCombinedExamModes()");
            return; // ✅ prevent call without subject
        }

        $.ajax({
            url: "/get_exam_modes_combined/",
            type: "GET",
            data: {
                org: org_id,
                class_id: class_id,
                subject_id: subject_id,
                exam_type_id: exam_type_id,
                is_version: is_version
            },
            success: function(response) {
                let tbody = $("#MODESTB");
                tbody.find("tr:not(:first):not(:last)").remove();

                response.modes.forEach(function(item) {
                    let row = `
                        <tr ${item.is_saved ? 'class="saved-row"' : ''}>
                            <td style="text-align:center;">${item.sl}</td>
                            <td style="text-align:left;">
                                <input type="hidden" name="def_mode_id[]" value="${item.def_mode_id}">
                                <input type="text" name="is_mode_name" value="${item.is_mode_name}" 
                                    style="outline:none; border:0; background:none;" readonly>
                            </td>
                            <td style="text-align:center;">
                                <input type="number" class="form-control item_inputbox defualts_marks_zero" 
                                    name="is_default_marks[]" value="${item.is_default_marks}" min="0" max="100" 
                                    style="width:96%; text-align:center;">
                            </td>
                            <td style="text-align:center;">
                                <input type="number" class="form-control item_inputbox defualts_marks_zero" 
                                    name="is_pass_marks[]" value="${item.is_pass_marks}" min="0" max="100" 
                                    style="width:96%; text-align:center;">
                            </td>
                            <td style="text-align:center;">
                                <input type="hidden" name="is_active[]" value="${item.is_active ? 'True' : 'False'}" class="is_active_hidden">
                                <input type="checkbox" class="form-check-input is_active_cb" style="height:1.5rem; width:1.5rem;"
                                    ${item.is_active ? "checked" : ""}>
                            </td>
                        </tr>
                    `;
                    $(row).insertBefore("#MODESTB tr:last");
                });

                // Focus-blur handler
                $('.defualts_marks_zero').off('focus blur').on('focus', function() {
                    if ($(this).val() === '0') $(this).val('');
                }).on('blur', function() {
                    if ($(this).val().trim() === '') $(this).val('0');
                });

                // Checkbox toggle handler
                $(document).off('change', '.is_active_cb').on('change', '.is_active_cb', function() {
                    let hidden = $(this).closest('td').find('.is_active_hidden');
                    hidden.val($(this).is(':checked') ? 'True' : 'False');
                });

                recalcMarks();
            },
            error: function(err) {
                console.error("Error loading exam modes:", err);
            }
        });
    }


    $(function () {
        $('#EXMODESFORM').submit(function (e) {
            e.preventDefault();
            $.ajax({
                headers: {
                    "X-CSRFToken": '{{csrf_token}}'
                },
                url: "{% url 'save_defaults_exam_modes' %}",
                data: new FormData($(this)[0]),
                cache: false,
                contentType: false,
                processData: false,
                method: 'POST',
                type: 'POST',
                dataType: 'json',
                success: function (resp) {
                    if (success = resp.msg) {
                        toastr.success(resp.msg)
                    } else {
                        toastr.error(resp.errmsg);
                    }
                }
            })
        })
    })
</script>
</main>
{% endblock %}
