<section style="position: absolute; right: 1rem; text-align: center; top: 0; font-size: 1rem; width: 10%;">

<script>
    //<!--  -->
    $(document).ready(function () {

        // Get parameters from URL
        const urlParams = new URLSearchParams(window.location.search);
        var merit_id = urlParams.get("merit_id");
        var org_id = urlParams.get("org_id");
        var branch_id = urlParams.get("branch_id");

        $.ajax({
            url: "/get_merit_position_report_data/",
            type: "GET",
            data: {
                merit_id: merit_id,
                org_id: org_id,
                branch_id: branch_id,
            },
            success: function (response) {
                if (response.status === "success") {

                    /** ----------------------
                    * Fill Header Data
                    * ---------------------- **/
                    $(".com-receipt-logo").attr("src", response.header.logo);
                    $(".com-name").text(response.header.org_name);
                    $(".com-address-name").text(response.header.address);
                    $(".email-address-name").text(response.header.email);
                    $(".website-name").text(response.header.website);
                    $(".com-hotline-name").text(response.header.hotline);
                    $(".com-fax-name").text(response.header.fax);
                    $(".com-branch-title").text(response.header.branch_name);
                    $(".exam_type-version-year").text(response.header.exam_type_version_year);

                    /** ----------------------
                    * Build Table Head
                    * ---------------------- **/
                    let thead = "<tr style='border:1px solid;'>";
                    thead += "<th style='text-align:center;'>Sl</th>";
                    thead += "<th style='text-align:center;'>Name</th>";
                    thead += "<th style='text-align:center;'>Roll</th>";
                    thead += "<th style='text-align:center;'>Class</th>";
                    thead += "<th style='text-align:center;'>Section</th>";
                    thead += "<th style='text-align:center;'>Shift</th>";
                    thead += "<th style='text-align:center;'>Groups</th>";
                    thead += "<th style='text-align:center;'>Fail S. Count</th>";

                    // Subject Columns Dynamic
                    if(response.subjects && response.subjects.length > 0){
                        response.subjects.forEach(function(sub){
                            thead += `<th style='text-align:center;'>${sub.subject_name}</th>`;
                        });
                    }

                    thead += "<th style='text-align:center;'>Tot Obt Marks</th>";
                    thead += "<th style='text-align:center;'>GPA</th>";
                    thead += "<th style='text-align:center;'>Merit Position</th>";
                    thead += "</tr>";

                    $("#MERITPOSTHEAD").html(thead);

                    /** ----------------------
                    * Build Table Body
                    * ---------------------- **/
                    let tbody = "";
                    response.table.forEach(function(item){
                        tbody += "<tr>";
                        tbody += `<td>${item.sl}</td>`;
                        tbody += `<td style='text-align:left;'>${item.name}</td>`;
                        tbody += `<td>${item.roll}</td>`;
                        tbody += `<td>${item.class}</td>`;
                        tbody += `<td>${item.section}</td>`;
                        tbody += `<td>${item.shift}</td>`;
                        tbody += `<td>${item.groups}</td>`;
                        tbody += `<td>${item.fails_count}</td>`;

                        // Subject Marks
                        if(response.subjects && response.subjects.length > 0){
                            response.subjects.forEach(function(sub){
                                tbody += `<td>${item[sub.col_key] !== undefined ? item[sub.col_key] : ''}</td>`;
                            });
                        }

                        tbody += `<td>${item.total_obtained_marks}</td>`;
                        tbody += `<td>${item.gpa}</td>`;
                        tbody += `<td>${item.merit_position}</td>`;
                        tbody += "</tr>";
                    });

                    $("#MERITPOSTBODY").html(tbody);
                }
            }
        });

    });
    //<!--  -->

    //
    function printReceipt() {
        const footerText = 'TECHROOT (Pvt.) Ltd';
        const now = new Date();
        const formattedDateTime = now.toLocaleString();
        const pageNumber = 1; // Update this dynamically if needed

        // Append your footer content
        const footerContent =
            `<div class="footer">
                <span class="software-woner-title">Software By: </span>
                <span class="software-woner-name">${footerText}</span>
                <span class="printed-by-title">- Printed By: </span>
                <span class="printed-by-name"></span>
                <span class="printed-on-title">- Printed on: </span>
                <span class="printed-on-date">${formattedDateTime}</span>
                <span class="printed-page-title">- Page </span>
                <span class="printed-page-no">${pageNumber}</span>
            </div>`;

        var printContents = document.querySelector('main').innerHTML;
        var originalContents = document.body.innerHTML;

        // Append footer content to the end of the print contents
        printContents += footerContent;

        document.body.innerHTML = printContents;
        window.print();
        document.body.innerHTML = originalContents;
    }
    //<!--  -->
    //
</script>
