<script>
    //<!--  -->
    $(document).ready(function () {

        function getUrlParameter(name) {
            const params = new URLSearchParams(window.location.search);
            return params.get(name);
        }

        const res_fin_id = getUrlParameter('res_fin_id');

        if (!res_fin_id) {
            $("#finalizedReportTable tbody").html(`
                <tr><td colspan="20" class="text-center text-warning">res_fin_id missing in URL!</td></tr>
            `);
            return;
        }

        $.ajax({
            url: "{% url 'get_results_finalization_details_report' %}",
            type: "GET",
            data: { res_fin_id: res_fin_id },

            beforeSend: function () {
                $("#finalizedReportTable tbody").html(`
                    <tr><td colspan="20" class="text-center text-muted">Loading...</td></tr>
                `);
            },

            success: function (response) {

                if (!response.success) {
                    $("#finalizedReportTable tbody").html(`
                        <tr><td colspan="20" class="text-center text-danger">${response.message}</td></tr>
                    `);
                    return;
                }

                // Fill Headers
                const h = response.header;
                $('.com-name').text(h.org_name);
                $('.com-address-name').text(h.address);
                $('.email-address-name').text(h.email);
                $('.website-name').text(h.website);
                $('.com-hotline-name').text(h.phone_hotline);
                $('.com-fax-name').text(h.fax);
                $('.com-receipt-logo').attr('src', h.logo_url);
                $('.com-branch-title').text(h.branch_name);
                $('.exam_type-version-year').text(h.exam_line);
                $('.is_changed_by_and_date').text(h.changed_info);

                renderFinalizedTable(response.data);
            },

            error: function () {
                $("#finalizedReportTable tbody").html(`
                    <tr><td colspan="20" class="text-center text-danger">Server Error!</td></tr>
                `);
            }
        });
    });


    function renderFinalizedTable(data) {

        $("#finalizedReportTable thead").empty();
        $("#finalizedReportTable tbody").empty();

        if (!data || data.length === 0) {
            $("#finalizedReportTable tbody").html(
                "<tr><td colspan='20'>No Data Found</td></tr>"
            );
            return;
        }

        // Collect Unique Mode Names
        let modeList = [];
        data.forEach(item => {
            item.modes.forEach(md => {
                if (!modeList.includes(md.is_mode_name)) {
                    modeList.push(md.is_mode_name);
                }
            });
        });

        // Build THEAD
        let thead = "<tr style='text-align: center; font-weight: bold; font-size: 0.9rem;'>";
        thead += "<th>Sl</th>";
        thead += "<th>Student Name</th>";
        thead += "<th>Roll</th>";
        thead += "<th>Class</th>";
        thead += "<th>Section</th>";
        thead += "<th>Shift</th>";
        thead += "<th>Group</th>";
        thead += "<th>Subject</th>";
        thead += "<th>Exam Type</th>";

        modeList.forEach(md => {
            thead += `<th>${md}</th>`;
            thead += `<th>P/A</th>`;
        });

        thead += "</tr>";
        $("#finalizedReportTable thead").html(thead);

        // Build TBODY
        let tbody = "";

        data.forEach((row, index) => {
            tbody += "<tr style='font-size: 0.8rem;'>";
            tbody += `<td style="text-align: center;">${index + 1}</td>`;
            tbody += `<td style="text-align: left;">${row.full_name}</td>`;
            tbody += `<td style="text-align: center;">${row.roll_no}</td>`;
            tbody += `<td style="text-align: center;">${row.class_name}</td>`;
            tbody += `<td style="text-align: center;">${row.section_name}</td>`;
            tbody += `<td style="text-align: center;">${row.shift_name}</td>`;
            tbody += `<td style="text-align: center;">${row.group_name}</td>`;
            tbody += `<td style="text-align: center;">${row.subject_name}</td>`;
            tbody += `<td style="text-align: center;">${row.exam_type_name}</td>`;

            modeList.forEach(md => {
                let modeObj = row.modes.find(x => x.is_mode_name === md);

                if (modeObj) {
                    tbody += `<td style="text-align: center;">${modeObj.is_actual_marks}</td>`;
                    tbody += `<td style="text-align: center;">${modeObj.is_absent_present ? "P" : "A"}</td>`;
                } else {
                    tbody += "<td style=\"text-align: center;\">-</td><td style=\"text-align: center;\">-</td>";
                }
            });

            tbody += "</tr>";
        });

        $("#finalizedReportTable tbody").html(tbody);
    }
    //<!--  -->

    //
    function printReceipt() {
        const footerText = 'TECHROOT (Pvt.) Ltd';
        const now = new Date();
        const formattedDateTime = now.toLocaleString();
        const pageNumber = 1; // Update this dynamically if needed

        // Append your footer content
        const footerContent =
            `<div class="footer">
                <span class="software-woner-title">Software By: </span>
                <span class="software-woner-name">${footerText}</span>
                <span class="printed-by-title">- Printed By: </span>
                <span class="printed-by-name"></span>
                <span class="printed-on-title">- Printed on: </span>
                <span class="printed-on-date">${formattedDateTime}</span>
                <span class="printed-page-title">- Page </span>
                <span class="printed-page-no">${pageNumber}</span>
            </div>`;

        var printContents = document.querySelector('main').innerHTML;
        var originalContents = document.body.innerHTML;

        // Append footer content to the end of the print contents
        printContents += footerContent;

        document.body.innerHTML = printContents;
        window.print();
        document.body.innerHTML = originalContents;
    }
    //<!--  -->
    //
</script>
